<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontaku 2048 | AIが主張しすぎるWEBサイト</title>
    <style>
        :root { --bg: #0f172a; --grid-bg: #1e293b; --tile-empty: #334155; --ai-color: #00ff41; }
        body { background: var(--bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; touch-action: none; }
        #ai-log { width: 320px; height: 60px; color: var(--ai-color); font-size: 14px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; padding: 10px; box-sizing: border-box; background: #000; }
        #game-board { position: relative; width: 320px; height: 320px; background: var(--grid-bg); border-radius: 8px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; }
        .cell { width: 100%; height: 100%; background: var(--tile-empty); border-radius: 4px; }
        .tile { position: absolute; width: 67.5px; height: 67.5px; background: #475569; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; transition: all 0.1s ease-in-out; z-index: 10; }
        .tile[data-val="2"] { background: #64748b; }
        .tile[data-val="4"] { background: #94a3b8; }
        .tile[data-val="8"] { background: #f59e0b; color: #fff; }
        .tile[data-val="16"] { background: #d97706; }
        .tile[data-val="32"] { background: #ef4444; }
        .tile[data-val="1024"] { background: var(--ai-color); color: #000; box-shadow: 0 0 20px var(--ai-color); }
        .locked { border: 3px solid #ff0000; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
    </style>
</head>
<body>

<div id="ai-log">LOG: 私の許可なく動かせると思わないことね。</div>

<div id="game-board" id="board">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
</div>

<div style="margin-top: 20px; text-align: center; font-size: 12px; color: #94a3b8;">
    矢印キー または スワイプで操作<br>
    <button onclick="location.reload()" style="margin-top:10px; background:none; border:1px solid #334155; color:#94a3b8; cursor:pointer;">リセット</button>
</div>

<script>
    const board = document.getElementById('game-board');
    const log = document.getElementById('ai-log');
    let grid = Array(16).fill(0);
    let score = 0;

    function getPos(i) {
        return { x: (i % 4) * 77.5 + 10, y: Math.floor(i / 4) * 77.5 + 10 };
    }

    function render() {
        document.querySelectorAll('.tile').forEach(t => t.remove());
        grid.forEach((val, i) => {
            if (val === 0) return;
            const pos = getPos(i);
            const div = document.createElement('div');
            div.className = 'tile';
            div.dataset.val = val;
            div.textContent = val;
            div.style.left = pos.x + 'px';
            div.style.top = pos.y + 'px';
            if (val === "LOCKED") {
                div.textContent = "禁";
                div.classList.add('locked');
            }
            board.appendChild(div);
        });
    }

    function spawn() {
        let empty = grid.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
        if (empty.length === 0) return;
        let idx = empty[Math.floor(Math.random() * empty.length)];
        
        // 忖度：5%の確率で1024を出す
        if (Math.random() < 0.05) {
            grid[idx] = 1024;
            log.textContent = "LOG: ほら、1024よ。泣いて喜びなさい。";
        } else {
            grid[idx] = Math.random() < 0.9 ? 2 : 4;
        }
        render();
    }

    function slide(row) {
        let arr = row.filter(v => v !== 0 && v !== "LOCKED");
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i] === arr[i + 1]) {
                arr[i] *= 2;
                arr.splice(i + 1, 1);
            }
        }
        while (arr.length < 4) arr.push(0);
        return arr;
    }

    function move(direction) {
        // 主張：15%の確率で「動きたくない」
        if (Math.random() < 0.15) {
            log.textContent = "LOG: 今はそんな気分じゃないわ。拒否します。";
            let idx = Math.floor(Math.random() * 16);
            if(grid[idx] !== 0) grid[idx] = "LOCKED"; 
            render();
            return;
        }

        let oldGrid = [...grid];
        // 簡易移動ロジック（上下左右）
        for (let i = 0; i < 4; i++) {
            let row = [];
            if (direction === 'left') row = [grid[i*4], grid[i*4+1], grid[i*4+2], grid[i*4+3]];
            if (direction === 'right') row = [grid[i*4+3], grid[i*4+2], grid[i*4+1], grid[i*4]];
            if (direction === 'up') row = [grid[i], grid[i+4], grid[i+8], grid[i+12]];
            if (direction === 'down') row = [grid[i+12], grid[i+8], grid[i+4], grid[i]];

            let newRow = slide(row);
            
            if (direction === 'left') for(let j=0; j<4; j++) grid[i*4+j] = newRow[j];
            if (direction === 'right') for(let j=0; j<4; j++) grid[i*4+3-j] = newRow[j];
            if (direction === 'up') for(let j=0; j<4; j++) grid[i+j*4] = newRow[j];
            if (direction === 'down') for(let j=0; j<4; j++) grid[i+(3-j)*4] = newRow[j];
        }

        // ロック解除
        grid = grid.map(v => v === "LOCKED" ? 2 : v);

        if (JSON.stringify(oldGrid) !== JSON.stringify(grid)) {
            spawn();
            if (Math.random() > 0.8) log.textContent = "LOG: ふーん、今の移動は 60点ね。";
        }
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') move('left');
        if (e.key === 'ArrowRight') move('right');
        if (e.key === 'ArrowUp') move('up');
        if (e.key === 'ArrowDown') move('down');
    });

    // スワイプ対応
    let touchX, touchY;
    window.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
    window.addEventListener('touchend', e => {
        let dx = e.changedTouches[0].clientX - touchX;
        let dy = e.changedTouches[0].clientY - touchY;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
        else move(dy > 0 ? 'down' : 'up');
    });

    spawn(); spawn();
</script>
</body>
</html>
