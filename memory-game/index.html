<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x4 Memory Pro - Sound Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --tile-color: #1e293b;
            --active-color: #10b981;
            --error-color: #ef4444;
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .stats { margin-bottom: 10px; font-size: 1.1rem; color: #94a3b8; text-align: center; }
        .stats span { color: #3b82f6; font-weight: bold; }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 90vw;
            max-width: 380px;
            aspect-ratio: 1 / 1;
        }

        .tile {
            background-color: var(--tile-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .tile.active { background-color: var(--active-color); box-shadow: 0 0 15px var(--active-color); }
        .tile.error { background-color: var(--error-color); box-shadow: 0 0 15px var(--error-color); }

        .btn-start {
            margin-top: 25px;
            padding: 12px 50px;
            font-size: 1.2rem;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .hidden { visibility: hidden; }
    </style>
</head>
<body>

    <div class="stats">
        Level: <span id="level-val">1</span> | 
        Count: <span id="count-val">1</span> | 
        Speed: <span id="speed-val">Normal</span>
    </div>

    <div class="game-board" id="board"></div>

    <button class="btn-start" id="start-btn" onclick="startGame()">START</button>

    <script>
        // --- 音響設定 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; // デジタル感のある矩形波
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const board = document.getElementById('board');
        const levelDisplay = document.getElementById('level-val');
        const countDisplay = document.getElementById('count-val');
        const speedDisplay = document.getElementById('speed-val');
        const startBtn = document.getElementById('start-btn');
        
        let sequence = [];
        let playerIndex = 0;
        let isWaiting = true;
        let totalAttempts = 0; // 何回目の挑戦か

        // タイル生成
        for (let i = 0; i < 16; i++) {
            const tile = document.createElement('button');
            tile.classList.add('tile');
            tile.id = `tile-${i}`;
            tile.addEventListener('mousedown', () => handleTileClick(i));
            board.appendChild(tile);
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startBtn.classList.add('hidden');
            sequence = [];
            totalAttempts = 0;
            nextLevel();
        }

        async function nextLevel() {
            isWaiting = true;
            playerIndex = 0;
            totalAttempts++;

            // 3回ごとに個数を増やす
            const memoryCount = Math.floor((totalAttempts - 1) / 3) + 1;
            // 3回目だけスピードを上げる
            const isFast = (totalAttempts % 3 === 0);
            const displaySpeed = isFast ? 200 : 500;

            // シーケンスの更新（個数が増える時だけ新しく作り直す）
            if (sequence.length < memoryCount) {
                sequence.push(Math.floor(Math.random() * 16));
            }

            // 画面表示更新
            levelDisplay.innerText = totalAttempts;
            countDisplay.innerText = memoryCount;
            speedDisplay.innerText = isFast ? "FAST!" : "Normal";
            speedDisplay.style.color = isFast ? "#f59e0b" : "#94a3b8";

            await sleep(1000);

            for (const id of sequence) {
                await flashTile(id, displaySpeed);
                await sleep(isFast ? 100 : 200);
            }
            isWaiting = false;
        }

        async function flashTile(id, duration, type = 'active') {
            const tile = document.getElementById(`tile-${id}`);
            // IDに応じて音程を変える (200Hz〜600Hz)
            if (type === 'active') playTone(200 + (id * 25), duration / 1000);
            else playTone(100, 0.5); // エラー音

            tile.classList.add(type);
            await sleep(duration);
            tile.classList.remove(type);
        }

        async function handleTileClick(id) {
            if (isWaiting) return;

            if (id === sequence[playerIndex]) {
                playTone(400 + (playerIndex * 50), 0.1); // 入力音
                const tile = document.getElementById(`tile-${id}`);
                tile.classList.add('active');
                setTimeout(() => tile.classList.remove('active'), 150);

                playerIndex++;
                if (playerIndex === sequence.length) {
                    isWaiting = true;
                    setTimeout(nextLevel, 800);
                }
            } else {
                isWaiting = true;
                await flashTile(id, 500, 'error');
                alert(`Game Over!\n到達レベル: ${totalAttempts}\n記憶個数: ${sequence.length}`);
                startBtn.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
