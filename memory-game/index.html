<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x4 Memory Pro - Master Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --tile-color: #1e293b;
            --active-color: #10b981;
            --error-color: #ef4444;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* レベル表示を巨大化 */
        .big-level {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            color: var(--accent-color);
            line-height: 1;
        }
        
        .sub-stats {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .high-score {
            font-size: 0.9rem;
            color: #f59e0b;
            margin-top: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 90vw;
            max-width: 380px;
            aspect-ratio: 1 / 1;
        }

        .tile {
            background-color: var(--tile-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
        }

        .tile.active { background-color: var(--active-color); box-shadow: 0 0 20px var(--active-color); }
        .tile.error { background-color: var(--error-color); box-shadow: 0 0 20px var(--error-color); }

        .btn-start {
            margin-top: 30px;
            padding: 15px 60px;
            font-size: 1.3rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .hidden { visibility: hidden; }
    </style>
</head>
<body>

    <div class="big-level" id="level-val">1</div>
    <div class="sub-stats">
        Next: <span id="count-val">2</span> tiles | Speed: <span id="speed-val">Normal</span>
        <div class="high-score">BEST LEVEL: <span id="best-val">0</span></div>
    </div>

    <div class="game-board" id="board"></div>

    <button class="btn-start" id="start-btn" onclick="startGame()">START TRAINING</button>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function getTileFreq(id) { return 220 + (id * 30); }

        function playTone(freq, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const board = document.getElementById('board');
        const levelDisplay = document.getElementById('level-val');
        const countDisplay = document.getElementById('count-val');
        const speedDisplay = document.getElementById('speed-val');
        const bestDisplay = document.getElementById('best-val');
        const startBtn = document.getElementById('start-btn');
        
        let sequence = [];
        let playerIndex = 0;
        let isWaiting = true;
        let totalAttempts = 0;

        // ハイスコアの読み込み
        let highScore = localStorage.getItem('memoryGameBest') || 0;
        bestDisplay.innerText = highScore;

        for (let i = 0; i < 16; i++) {
            const tile = document.createElement('button');
            tile.classList.add('tile');
            tile.id = `tile-${i}`;
            tile.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                handleTileClick(i);
            });
            board.appendChild(tile);
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startGame() {
            startBtn.classList.add('hidden');
            sequence = [];
            totalAttempts = 0;
            nextLevel();
        }

        async function nextLevel() {
            isWaiting = true;
            playerIndex = 0;
            totalAttempts++;

            // 個数：レベル1から2個スタート（3回ごとに1増える）
            const memoryCount = Math.floor((totalAttempts - 1) / 3) + 2;
            const isFast = (totalAttempts % 3 === 0);
            const displaySpeed = isFast ? 180 : 450;

            sequence = [];
            for (let i = 0; i < memoryCount; i++) {
                sequence.push(Math.floor(Math.random() * 16));
            }

            levelDisplay.innerText = totalAttempts;
            countDisplay.innerText = memoryCount;
            speedDisplay.innerText = isFast ? "FAST" : "Normal";
            speedDisplay.style.color = isFast ? "#f59e0b" : "#94a3b8";

            await sleep(800);

            for (const id of sequence) {
                await flashTile(id, displaySpeed);
                await sleep(isFast ? 80 : 180);
            }
            isWaiting = false;
        }

        async function flashTile(id, duration, type = 'active') {
            const tile = document.getElementById(`tile-${id}`);
            const freq = (type === 'active') ? getTileFreq(id) : 100;
            playTone(freq, duration / 1000);
            tile.classList.add(type);
            await sleep(duration);
            tile.classList.remove(type);
        }

        async function handleTileClick(id) {
            if (isWaiting) return;

            if (id === sequence[playerIndex]) {
                playTone(getTileFreq(id), 0.15); 
                const tile = document.getElementById(`tile-${id}`);
                tile.classList.add('active');
                setTimeout(() => tile.classList.remove('active'), 100);

                playerIndex++;
                if (playerIndex === sequence.length) {
                    isWaiting = true;
                    // ハイスコア更新チェック
                    if (totalAttempts > highScore) {
                        highScore = totalAttempts;
                        localStorage.setItem('memoryGameBest', highScore);
                        bestDisplay.innerText = highScore;
                    }
                    setTimeout(nextLevel, 700);
                }
            } else {
                isWaiting = true;
                await flashTile(id, 500, 'error');
                alert(`GAME OVER\nLevel: ${totalAttempts}\nBest: ${highScore}`);
                startBtn.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
