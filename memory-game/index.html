<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Memory Master Pro | 4x4 記憶力・ワーキングメモリ訓練ゲーム</title>
    <meta name="description" content="4x4のパネルを使ってワーキングメモリを鍛える、シンプルかつ強力な脳トレゲーム。3回ごとに難易度が上がり、スピードも変化。ハイスコアを記録して自己ベストに挑戦しよう。">
    <meta name="keywords" content="脳トレ,記憶力,ワーキングメモリ,4x4,シグナルゲーム,JavaScriptゲーム,無料">
    
    <meta property="og:title" content="Memory Master Pro | 4x4 記憶力トレーニング">
    <meta property="og:description" content="あなたの記憶力の限界に挑戦！4x4パネルの光る順序を当てる本格脳トレ。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Time Toolkit Games">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Memory Master Pro",
      "operatingSystem": "Web Browser",
      "applicationCategory": "GameApplication",
      "offers": {
        "@type": "Offer",
        "price": "0"
      }
    }
    </script>

    <style>
        :root {
            --bg-color: #0f172a;
            --tile-color: #1e293b;
            --active-color: #10b981;
            --error-color: #ef4444;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .big-level {
            font-size: clamp(3rem, 15vw, 5rem);
            font-weight: 900;
            margin: 0;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        .sub-stats {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 20px;
            text-align: center;
        }

        .high-score {
            font-size: 0.9rem;
            color: #f59e0b;
            margin-top: 8px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: clamp(8px, 2vw, 15px);
            width: 92vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        .tile {
            background-color: var(--tile-color);
            border: none;
            border-radius: clamp(8px, 2vw, 15px);
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s, box-shadow 0.1s;
        }

        .tile.active { background-color: var(--active-color); box-shadow: 0 0 25px var(--active-color); }
        .tile.error { background-color: var(--error-color); box-shadow: 0 0 25px var(--error-color); }

        .btn-start {
            margin-top: 35px;
            padding: 16px 60px;
            font-size: 1.2rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5); }
        .hidden { display: none; }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <main>
        <h1 style="display:none;">Memory Master Pro</h1>
        <div class="big-level" id="level-val" aria-label="Current Level">1</div>
        
        <div class="sub-stats">
            Next: <span id="count-val">2</span> tiles | Speed: <span id="speed-val">Normal</span>
            <div class="high-score">BEST LEVEL: <span id="best-val">0</span></div>
        </div>

        <div class="game-board" id="board" role="grid"></div>

        <button class="btn-start" id="start-btn" onclick="startGame()">START TRAINING</button>
    </main>

    <footer>&copy; 2026 Time Toolkit Games</footer>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function getTileFreq(id) { return 220 + (id * 30); }

        function playTone(freq, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const board = document.getElementById('board');
        const levelDisplay = document.getElementById('level-val');
        const countDisplay = document.getElementById('count-val');
        const speedDisplay = document.getElementById('speed-val');
        const bestDisplay = document.getElementById('best-val');
        const startBtn = document.getElementById('start-btn');
        
        let sequence = [];
        let playerIndex = 0;
        let isWaiting = true;
        let totalAttempts = 0;

        let highScore = localStorage.getItem('memoryGameBest') || 0;
        bestDisplay.innerText = highScore;

        for (let i = 0; i < 16; i++) {
            const tile = document.createElement('button');
            tile.classList.add('tile');
            tile.id = `tile-${i}`;
            tile.setAttribute('aria-label', `Tile ${i+1}`);
            tile.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                handleTileClick(i);
            });
            board.appendChild(tile);
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startGame() {
            startBtn.classList.add('hidden');
            sequence = [];
            totalAttempts = 0;
            nextLevel();
        }

        async function nextLevel() {
            isWaiting = true;
            playerIndex = 0;
            totalAttempts++;

            const memoryCount = Math.floor((totalAttempts - 1) / 3) + 2;
            const isFast = (totalAttempts % 3 === 0);
            const displaySpeed = isFast ? 180 : 450;

            sequence = [];
            for (let i = 0; i < memoryCount; i++) {
                sequence.push(Math.floor(Math.random() * 16));
            }

            levelDisplay.innerText = totalAttempts;
            countDisplay.innerText = memoryCount;
            speedDisplay.innerText = isFast ? "FAST" : "Normal";
            speedDisplay.style.color = isFast ? "#f59e0b" : "#94a3b8";

            await sleep(800);

            for (const id of sequence) {
                await flashTile(id, displaySpeed);
                await sleep(isFast ? 80 : 180);
            }
            isWaiting = false;
        }

        async function flashTile(id, duration, type = 'active') {
            const tile = document.getElementById(`tile-${id}`);
            const freq = (type === 'active') ? getTileFreq(id) : 100;
            playTone(freq, duration / 1000);
            tile.classList.add(type);
            await sleep(duration);
            tile.classList.remove(type);
        }

        async function handleTileClick(id) {
            if (isWaiting) return;

            if (id === sequence[playerIndex]) {
                playTone(getTileFreq(id), 0.15); 
                const tile = document.getElementById(`tile-${id}`);
                tile.classList.add('active');
                setTimeout(() => tile.classList.remove('active'), 100);

                playerIndex++;
                if (playerIndex === sequence.length) {
                    isWaiting = true;
                    if (totalAttempts > highScore) {
                        highScore = totalAttempts;
                        localStorage.setItem('memoryGameBest', highScore);
                        bestDisplay.innerText = highScore;
                    }
                    setTimeout(nextLevel, 700);
                }
            } else {
                isWaiting = true;
                await flashTile(id, 500, 'error');
                alert(`GAME OVER\nLevel: ${totalAttempts}\nBest: ${highScore}`);
                startBtn.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
