<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>セキュア画像PDF変換</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="画像PDF変換">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/2563eb/ffffff?text=PDF">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #e11d48; 
    --primary-hover: #be123c; 
    --bg: #fff1f2;}
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: env(safe-area-inset-top) 20px 20px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-top: 10px; }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; text-align: center; color: #0f172a; }
        .sub-text { font-size: 0.75rem; color: #64748b; text-align: center; margin-bottom: 20px; line-height: 1.5; }
        .drop-zone { border: 2px dashed #2563eb; border-radius: 16px; padding: 35px 20px; text-align: center; cursor: pointer; transition: 0.2s; background: #eff6ff; -webkit-tap-highlight-color: transparent; }
        .drop-zone strong { color: #1d4ed8; font-size: 1rem; }
        #add-more { font-size: 0.75rem; color: #2563eb; font-weight: bold; margin-top: 10px; background: white; padding: 6px 14px; border-radius: 20px; display: inline-block; border: 1px solid #2563eb; }
        #file-list { margin-top: 20px; list-style: none; padding: 0; width: 100%; }
        .file-item { display: flex; align-items: center; background: #f1f5f9; margin-bottom: 8px; padding: 10px 12px; border-radius: 12px; font-size: 0.85rem; border: 1px solid #e2e8f0; }
        .page-num { font-weight: bold; color: #64748b; margin-right: 10px; min-width: 45px; font-size: 0.7rem; background: #fff; padding: 4px 6px; border-radius: 6px; text-align: center; border: 1px solid #cbd5e1; }
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .controls { display: flex; gap: 6px; margin-left: 8px; }
        .btn-sm { border: none; background: #fff; cursor: pointer; padding: 8px 10px; border-radius: 8px; font-size: 0.9rem; border: 1px solid #cbd5e1; }
        .config { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        label { font-size: 0.8rem; font-weight: bold; color: #475569; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 1rem; appearance: none; background: white; }
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
        #status-msg { margin-top: 15px; text-align: center; font-weight: bold; min-height: 1.2rem; }
        .success { color: #059669; background: #ecfdf5; padding: 10px 20px; border-radius: 10px; display: inline-block; width: 100%; box-sizing: border-box; }
        
        /* インストール案内 */
        .install-guide { margin-top: 30px; font-size: 0.75rem; color: #94a3b8; text-align: center; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🖼️ セキュア画像PDF変換</h1>
    <p class="sub-text">
        1枚からでもOK。複数枚を1つのPDFに結合。<br>
        <b>デバイス内で完結</b>（プライバシー保護設計）
    </p>
    
    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
        <strong>画像をえらぶ</strong><br>
        <span style="font-size: 0.8rem; color: #1e40af;">（カメラ撮影やライブラリから）</span>
        <div id="add-more-container" style="display:none; margin-top:10px;">
            <span id="add-more">＋ さらに追加</span>
        </div>
        <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
    </div>

    <ul id="file-list"></ul>

    <div class="config">
        <label>保存ファイル名</label>
        <input type="text" id="pdf-name" placeholder="ファイル名">
        
        <label>画質設定</label>
        <select id="quality">
            <option value="1.0">最高画質 (100%)</option>
            <option value="0.7" selected>標準 (70%) - 推奨</option>
            <option value="0.4">極限圧縮 (40%)</option>
        </select>
    </div>

    <button id="convert-btn" class="main-btn" onclick="generatePDF()" disabled>PDFを作成・保存</button>
    <div id="status-msg"></div>

    <div class="install-guide">
        💡 <b>アプリのように使うには</b><br>
        iPhone: 下の共有ボタンから「ホーム画面に追加」<br>
        Android: 右上のメニューから「ホーム画面に追加」
    </div>
</div>

<script>
    let filesArray = [];

    window.onload = () => {
        const now = new Date();
        const dateStr = now.getFullYear() + ('0' + (now.getMonth() + 1)).slice(-2) + ('0' + now.getDate()).slice(-2) + "_" + ('0' + now.getHours()).slice(-2) + ('0' + now.getMinutes()).slice(-2);
        document.getElementById('pdf-name').value = "PDF_" + dateStr;
    };

    function handleFiles(files) {
        filesArray = [...filesArray, ...Array.from(files)];
        updateList();
        clearStatus();
    }

    function updateList() {
        const list = document.getElementById('file-list');
        const btn = document.getElementById('convert-btn');
        const addMore = document.getElementById('add-more-container');
        list.innerHTML = '';
        
        filesArray.forEach((file, index) => {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `
                <span class="page-num">${index + 1}P</span>
                <span class="file-name">${file.name}</span>
                <div class="controls">
                    ${filesArray.length > 1 ? `
                        <button class="btn-sm" onclick="event.stopPropagation(); moveItem(${index}, -1)">↑</button>
                        <button class="btn-sm" onclick="event.stopPropagation(); moveItem(${index}, 1)">↓</button>
                    ` : ''}
                    <button class="btn-sm" style="color:#ef4444" onclick="event.stopPropagation(); removeItem(${index})">✕</button>
                </div>
            `;
            list.appendChild(li);
        });
        
        btn.disabled = filesArray.length === 0;
        addMore.style.display = filesArray.length > 0 ? 'block' : 'none';
        btn.innerText = filesArray.length > 1 ? "まとめてPDF結合・保存" : "PDFに変換して保存";
    }

    function moveItem(index, direction) {
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < filesArray.length) {
            [filesArray[index], filesArray[newIndex]] = [filesArray[newIndex], filesArray[index]];
            updateList();
        }
    }

    function removeItem(index) {
        filesArray.splice(index, 1);
        updateList();
    }

    function clearStatus() { document.getElementById('status-msg').innerHTML = ''; }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const btn = document.getElementById('convert-btn');
        const status = document.getElementById('status-msg');
        const quality = parseFloat(document.getElementById('quality').value || 0.7);
        
        btn.disabled = true;
        status.innerText = "作成中...";

        try {
            for (let i = 0; i < filesArray.length; i++) {
                const imgData = await readFileAsDataURL(filesArray[i], quality);
                const imgProps = doc.getImageProperties(imgData);
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            }
            let fileName = document.getElementById('pdf-name').value.trim() || "output";
            if (!fileName.toLowerCase().endsWith('.pdf')) fileName += '.pdf';
            doc.save(fileName);
            status.innerHTML = '<span class="success">✅ 完了しました！</span>';
        } catch (e) {
            status.innerText = "エラーが発生しました。";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function readFileAsDataURL(file, quality) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
