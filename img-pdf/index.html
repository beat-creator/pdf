<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-489DX1LV2M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-489DX1LV2M');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title id="meta-title">Secure Toolkit</title>
    <meta name="description" id="meta-desc" content="">

    <link rel="icon" href="../icon-512.png" type="image/png">
    <link rel="apple-touch-icon" href="../icon-512.png">
    <link rel="manifest" href="../manifest.json">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8; 
            --bg: #eff6ff; 
            --card-bg: #ffffff; 
            --text: #1e293b; 
            --border: #e2e8f0; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-header { 
            width: 100%; 
            background: var(--card-bg); 
            border-bottom: 1px solid var(--border); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-sizing: border-box; 
        }
        
        .back-btn { 
            display: flex;
            align-items: center;
            text-decoration: none; 
            color: var(--text); 
            font-size: 0.8rem; 
            font-weight: 600; 
            background: #f1f5f9; 
            padding: 6px 12px; 
            border-radius: 20px; 
            transition: 0.2s;
        }

        #install-btn {
            display: none;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }

        .container { 
            max-width: 500px; 
            width: 95%; 
            background: var(--card-bg); 
            margin: 20px 0; 
            padding: 24px; 
            border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
        }
        
        .info-box { 
            background: var(--bg); 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            line-height: 1.5; 
            color: var(--primary-hover); 
            display: flex; 
            align-items: flex-start; 
        }

        .drop-zone { 
            border: 2px dashed var(--primary); 
            border-radius: 16px; 
            padding: 35px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: #fff; 
            color: var(--primary); 
            font-weight: bold; 
            transition: 0.3s;
        }
        
        #file-list { margin: 20px 0; padding: 0; list-style: none; width: 100%; }
        .file-item { 
            display: flex; 
            align-items: center; 
            background: #f8fafc; 
            margin-bottom: 10px; 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            font-size: 0.85rem; 
        }
        
        .page-num { 
            font-weight: bold; 
            color: #64748b; 
            margin-right: 10px; 
            min-width: 45px; 
            font-size: 0.7rem; 
            background: #fff; 
            padding: 4px 6px; 
            border-radius: 6px; 
            text-align: center; 
            border: 1px solid var(--border); 
        }
        
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .controls { display: flex; gap: 4px; margin-left: 8px; }
        .btn-sm { 
            border: none; 
            background: #fff; 
            padding: 6px 10px; 
            border-radius: 8px; 
            font-size: 0.8rem; 
            border: 1px solid var(--border); 
            cursor: pointer; 
        }
        
        .config-card { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 6px; display: block; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            margin-bottom: 12px; 
            background: #fff; 
        }
        
        .main-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: 0.2s; 
        }
        .main-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        .tool-info {
            max-width: 500px;
            width: 95%;
            margin: 0 auto 20px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .nav-item {
            text-decoration: none;
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text);
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .nav-item:hover { background: #f1f5f9; }

        #status-msg { margin-top: 15px; text-align: center; font-weight: bold; min-height: 1.2rem; }
    </style>
</head>
<body data-tool-key="pdf">

    <header class="app-header">
        <a href="../" class="back-btn" id="nav-home"></a>
        <div style="flex:1; text-align:center; font-weight:bold; margin-left: 10px;" id="header-title"></div>
        <button id="install-btn">📲 保存</button>
    </header>

    <div class="container">
        <h1 style="font-size: 1.3rem; margin-bottom: 20px; text-align:center;" id="main-h1"></h1>
        
        <div class="info-box">
            <span>🔒</span>
            <div style="margin-left:8px;" id="safe-msg"></div>
        </div>
        
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div id="drop-text"></div>
            <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
        </div>

        <ul id="file-list"></ul>

        <div class="config-card">
            <label id="label-filename"></label>
            <input type="text" id="pdf-name" placeholder="">
            
            <label id="label-quality"></label>
            <select id="quality">
                <option value="0.7" id="opt-standard" selected></option>
                <option value="1.0" id="opt-high"></option>
                <option value="0.4" id="opt-low"></option>
            </select>
        </div>

        <button id="convert-btn" class="main-btn" onclick="generatePDF()" disabled></button>
        <div id="status-msg"></div>
    </div>

    <div class="tool-info">
        <h2 style="font-size: 1.1rem; color: #2563eb; margin-top: 0;" id="footer-h2"></h2>
        <p style="font-size: 0.85rem; line-height: 1.6; color: #475569;" id="footer-desc"></p>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 12px; text-align: center; font-weight: bold;" id="recommend-text"></p>
        <div class="nav-grid">
            <a href="../zip/" class="nav-item">📦 ZIP</a>
            <a href="../resize/" class="nav-item">↔️ Resize</a>
            <a href="../" class="nav-item" id="nav-back" style="background: #f1f5f9; font-weight: bold;">🏠 Home</a>
        </div>
    </div>

    <footer style="padding:20px; font-size:0.7rem; color:#94a3b8; text-align:center;">
        &copy; 2026 Secure Toolkit
    </footer>

    <script>
        let currentLang = 'ja';
        let i18nData = null;
        let filesArray = [];

        // 共通翻訳と個別データの統合
        async function initI18n() {
            try {
                const response = await fetch('../i18n-tools.json');
                i18nData = await response.json();
                
                const lang = (navigator.language || navigator.userLanguage).split('-')[0];
                currentLang = ['ja', 'en', 'zh'].includes(lang) ? lang : 'en';
                
                const toolKey = document.body.getAttribute('data-tool-key');
                const t = i18nData[toolKey];
                
                const common = {
                    ja: { home: "🏠 ツール一覧", back: "🏠 ホーム", recommend: "こちらのツールもおすすめ", processing: "⏳ 作成中...", done: "✅ 完了しました！", error: "❌ エラーが発生しました。", drop: "➕ 画像を選択 または ドロップ", fname: "保存ファイル名", quality: "画質設定", q1: "標準 (推奨)", q2: "最高画質 (ファイル大)", q3: "圧縮優先 (ファイル小)", btn: "PDFを作成して保存" },
                    en: { home: "🏠 All Tools", back: "🏠 Home", recommend: "Recommended Tools", processing: "⏳ Creating...", done: "✅ Completed!", error: "❌ Error occurred.", drop: "➕ Select or Drop Images", fname: "Output Filename", quality: "Quality Setting", q1: "Standard (Recommended)", q2: "High Quality (Large)", q3: "Compress (Small)", btn: "Create & Save PDF" },
                    zh: { home: "🏠 工具列表", back: "🏠 首页", recommend: "推荐工具", processing: "⏳ 正在生成...", done: "✅ 完成！", error: "❌ 发生错误。", drop: "➕ 选择或拖放图像", fname: "保存文件名", quality: "画质设置", q1: "标准 (推荐)", q2: "最高画质 (文件大)", q3: "压缩优先 (文件小)", btn: "创建并保存PDF" }
                }[currentLang];

                // UIの反映
                document.title = t.seo_title[currentLang];
                document.getElementById('meta-title').innerText = t.seo_title[currentLang];
                document.getElementById('meta-desc').setAttribute('content', t.meta_desc[currentLang]);
                document.getElementById('nav-home').innerText = common.home;
                document.getElementById('header-title').innerText = t.top_name[currentLang];
                document.getElementById('main-h1').innerText = t.emoji + " " + t.name[currentLang];
                document.getElementById('safe-msg').innerHTML = `<strong>${currentLang === 'ja' ? 'サーバー送信なし' : (currentLang === 'zh' ? '无需上传服务器' : 'No Upload')}:</strong> ${t.meta_desc[currentLang]}`;
                document.getElementById('drop-text').innerText = common.drop;
                document.getElementById('label-filename').innerText = common.fname;
                document.getElementById('label-quality').innerText = common.quality;
                document.getElementById('opt-standard').innerText = common.q1;
                document.getElementById('opt-high').innerText = common.q2;
                document.getElementById('opt-low').innerText = common.q3;
                document.getElementById('convert-btn').innerText = common.btn;
                
                const footerParts = t.footer_desc[currentLang].split('\n');
                document.getElementById('footer-h2').innerText = footerParts[0];
                document.getElementById('footer-desc').innerText = footerParts[1];
                document.getElementById('recommend-text').innerText = common.recommend;
                document.getElementById('nav-back').innerText = common.back;

                window.statusMsg = common;
            } catch (err) {
                console.error("i18n Load Error:", err);
            }
        }

        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        });

        window.onload = () => {
            initI18n();
            const now = new Date();
            document.getElementById('pdf-name').value = "PDF_" + now.getFullYear() + ('0' + (now.getMonth() + 1)).slice(-2) + ('0' + now.getDate()).slice(-2);
        };

        // File Logic
        const dz = document.getElementById('drop-zone');
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = "#eff6ff"; });
        dz.addEventListener('dragleave', () => { dz.style.background = "#fff"; });
        dz.addEventListener('drop', (e) => {
            e.preventDefault();
            dz.style.background = "#fff";
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) { 
            filesArray = [...filesArray, ...Array.from(files)]; 
            updateList(); 
        }
        
        function updateList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            filesArray.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `<span class="page-num">${index+1}P</span><span class="file-name">${file.name}</span><div class="controls">${filesArray.length > 1 ? `<button class="btn-sm" onclick="moveItem(${index}, -1)">↑</button><button class="btn-sm" onclick="moveItem(${index}, 1)">↓</button>` : ''}<button class="btn-sm" style="color:#ef4444; border:none; background:transparent;" onclick="removeItem(${index})">✕</button></div>`;
                list.appendChild(li);
            });
            document.getElementById('convert-btn').disabled = filesArray.length === 0;
        }

        function moveItem(index, dir) {
            const newIndex = index + dir;
            if (newIndex >= 0 && newIndex < filesArray.length) {
                [filesArray[index], filesArray[newIndex]] = [filesArray[newIndex], filesArray[index]];
                updateList();
            }
        }
        function removeItem(index) { filesArray.splice(index, 1); updateList(); }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const btn = document.getElementById('convert-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true; 
            status.innerText = window.statusMsg.processing;

            try {
                for (let i = 0; i < filesArray.length; i++) {
                    const imgData = await readFileAsDataURL(filesArray[i], parseFloat(document.getElementById('quality').value));
                    const imgProps = doc.getImageProperties(imgData);
                    const pdfWidth = doc.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    if (i > 0) doc.addPage();
                    doc.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }
                let pdfName = document.getElementById('pdf-name').value.trim() || "document";
                if (!pdfName.toLowerCase().endsWith('.pdf')) pdfName += '.pdf';
                doc.save(pdfName);
                status.innerHTML = `<span style="color:#059669">${window.statusMsg.done}</span>`;
            } catch (e) { 
                status.innerText = window.statusMsg.error; 
            } finally { 
                btn.disabled = false; 
            }
        }

        function readFileAsDataURL(file, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d'); 
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
