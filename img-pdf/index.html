<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">

    <title>セキュア画像PDF変換｜Secure Toolkit - 登録不要でJPGをPDF化</title>
    <meta name="description" content="JPG/PNG画像をブラウザ内で安全にPDFへ変換。ファイルは一切送信されないため、プライバシーも万全です。">

    <style>
        :root { 
            --primary: #e11d48; 
            --primary-hover: #be123c; 
            --bg: #fff1f2; 
            --card-bg: #ffffff; 
            --text: #1e293b; 
            --border: #e2e8f0; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-header { 
            width: 100%; 
            background: var(--card-bg); 
            border-bottom: 1px solid var(--border); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-sizing: border-box; 
        }
        
        .back-btn { 
            display: flex;
            align-items: center;
            text-decoration: none; 
            color: var(--text); 
            font-size: 0.8rem; 
            font-weight: 600; 
            background: #f1f5f9; 
            padding: 6px 12px; 
            border-radius: 20px; 
            transition: 0.2s;
        }

        #install-btn {
            display: none;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }

        .container { 
            max-width: 500px; 
            width: 95%; 
            background: var(--card-bg); 
            margin: 20px 0; 
            padding: 24px; 
            border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
        }
        
        .info-box { 
            background: var(--bg); 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            line-height: 1.5; 
            color: var(--primary-hover); 
            display: flex; 
            align-items: flex-start; 
        }

        .drop-zone { 
            border: 2px dashed var(--primary); 
            border-radius: 16px; 
            padding: 35px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: #fff; 
            color: var(--primary); 
            font-weight: bold; 
            transition: 0.3s;
        }
        
        #file-list { margin: 20px 0; padding: 0; list-style: none; width: 100%; }
        .file-item { 
            display: flex; 
            align-items: center; 
            background: #f8fafc; 
            margin-bottom: 10px; 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            font-size: 0.85rem; 
        }
        
        .page-num { 
            font-weight: bold; 
            color: #64748b; 
            margin-right: 10px; 
            min-width: 45px; 
            font-size: 0.7rem; 
            background: #fff; 
            padding: 4px 6px; 
            border-radius: 6px; 
            text-align: center; 
            border: 1px solid var(--border); 
        }
        
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .controls { display: flex; gap: 4px; margin-left: 8px; }
        .btn-sm { 
            border: none; 
            background: #fff; 
            padding: 6px 10px; 
            border-radius: 8px; 
            font-size: 0.8rem; 
            border: 1px solid var(--border); 
            cursor: pointer; 
        }
        
        .config-card { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 6px; display: block; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            margin-bottom: 12px; 
            background: #fff; 
        }
        
        .main-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: 0.2s; 
        }
        .main-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* ツール情報・フッターナビ */
        .tool-info {
            max-width: 500px;
            width: 95%;
            margin: 0 auto 20px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .nav-item {
            text-decoration: none;
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text);
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .nav-item:hover { background: #f1f5f9; }

        #status-msg { margin-top: 15px; text-align: center; font-weight: bold; color: var(--primary); min-height: 1.2rem; }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="../" class="back-btn">🏠 ツール一覧</a>
        <div style="flex:1; text-align:center; font-weight:bold; margin-left: 10px;">画像PDF変換</div>
        <button id="install-btn">📲 保存</button>
    </header>

    <div class="container">
        <h1 style="font-size: 1.3rem; margin-bottom: 20px; text-align:center;">🖼️ 画像をPDFに変換</h1>
        
        <div class="info-box">
            <span>🔒</span>
            <div style="margin-left:8px;">
                <strong>サーバー送信なし:</strong> 処理はすべてブラウザ内で完結。外部にデータが漏れる心配はありません。
            </div>
        </div>
        
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div>➕ 画像を選択 または ドロップ</div>
            <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
        </div>

        <ul id="file-list"></ul>

        <div class="config-card">
            <label>保存ファイル名</label>
            <input type="text" id="pdf-name" placeholder="ファイル名を入力">
            
            <label>画質設定</label>
            <select id="quality">
                <option value="0.7" selected>標準 (推奨)</option>
                <option value="1.0">最高画質 (ファイル大)</option>
                <option value="0.4">圧縮優先 (ファイル小)</option>
            </select>
        </div>

        <button id="convert-btn" class="main-btn" onclick="generatePDF()" disabled>PDFを作成して保存</button>
        <div id="status-msg"></div>
    </div>

    <div class="tool-info">
        <h2 style="font-size: 1.1rem; color: var(--primary); margin-top: 0;">🔒 画像データは外に出しません</h2>
        <p style="font-size: 0.85rem; line-height: 1.6; color: #475569;">
            撮影した写真やスキャン画像をブラウザ内でPDFに変換。サーバーにアップロードする待ち時間もなく、即座にダウンロード可能です。
        </p>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 12px; text-align: center; font-weight: bold;">こちらのツールもおすすめ</p>
        <div class="nav-grid">
            <a href="../zip/" class="nav-item">📦 ZIP圧縮</a>
            <a href="../resize/" class="nav-item">↔️ リサイズ</a>
            <a href="../" class="nav-item" style="background: #f1f5f9; font-weight: bold;">🏠 一覧へ</a>
        </div>
    </div>

    <footer style="padding:20px; font-size:0.7rem; color:#94a3b8; text-align:center;">
        &copy; 2026 Secure Toolkit
    </footer>

    <script>
        // PWAインストール制御
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        let filesArray = [];
        window.onload = () => {
            const now = new Date();
            const dateStr = now.getFullYear() + ('0' + (now.getMonth() + 1)).slice(-2) + ('0' + now.getDate()).slice(-2);
            document.getElementById('pdf-name').value = "PDF_" + dateStr;
        };

        const dz = document.getElementById('drop-zone');
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = "#fff1f2"; });
        dz.addEventListener('dragleave', () => { dz.style.background = "#fff"; });
        dz.addEventListener('drop', (e) => {
            e.preventDefault();
            dz.style.background = "#fff";
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) { 
            filesArray = [...filesArray, ...Array.from(files)]; 
            updateList(); 
        }
        
        function updateList() {
            const list = document.getElementById('file-list');
            const btn = document.getElementById('convert-btn');
            list.innerHTML = '';
            filesArray.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `
                    <span class="page-num">${index+1}P</span>
                    <span class="file-name">${file.name}</span>
                    <div class="controls">
                        ${filesArray.length > 1 ? `
                            <button class="btn-sm" onclick="moveItem(${index}, -1)">↑</button>
                            <button class="btn-sm" onclick="moveItem(${index}, 1)">↓</button>
                        ` : ''}
                        <button class="btn-sm" style="color:#ef4444" onclick="removeItem(${index})">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });
            btn.disabled = filesArray.length === 0;
        }

        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < filesArray.length) {
                [filesArray[index], filesArray[newIndex]] = [filesArray[newIndex], filesArray[index]];
                updateList();
            }
        }

        function removeItem(index) { filesArray.splice(index, 1); updateList(); }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const btn = document.getElementById('convert-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true; 
            status.innerText = "⏳ 作成中...";
            try {
                for (let i = 0; i < filesArray.length; i++) {
                    const imgData = await readFileAsDataURL(filesArray[i], parseFloat(document.getElementById('quality').value));
                    const imgProps = doc.getImageProperties(imgData);
                    const pdfWidth = doc.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    
                    if (i > 0) doc.addPage();
                    doc.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }
                let pdfName = document.getElementById('pdf-name').value.trim() || "document";
                if (!pdfName.toLowerCase().endsWith('.pdf')) pdfName += '.pdf';
                doc.save(pdfName);
                status.innerHTML = '<span style="color:#059669">✅ 完了しました！</span>';
            } catch (e) { 
                status.innerText = "❌ エラーが発生しました。"; 
                console.error(e);
            } finally { 
                btn.disabled = false; 
            }
        }

        function readFileAsDataURL(file, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; 
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d'); 
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
