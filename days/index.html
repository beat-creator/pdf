<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Day Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 明るいポジティブなカラーパレット */
            --bg-color: #f0f9ff; /* 爽やかな薄い水色 */
            --text-main: #1e293b; /* 深い青灰色の文字 */
            --accent-start: #ff7e5f; /* サンライズ・オレンジ */
            --accent-end: #feb47b;   /* 柔らかなオレンジ */
            --panel-bg: rgba(255, 255, 255, 0.9); /* 白いパネル（半透明） */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 126, 95, 0.1) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(123, 180, 235, 0.1) 0px, transparent 50%);
        }

        .main-container {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        /* ヘッダー・挨拶 */
        header {
            margin-bottom: 2rem;
        }

        #greetings {
            font-size: 1.5rem;
            font-weight: 300;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        #greetings strong {
            font-weight: 600;
            color: var(--text-main);
        }

        /* 年月日・时刻のパネル */
        .time-panel {
            background: var(--panel-bg);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 2rem;
        }

        #date-display {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.1rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        /* 時刻（メイン） */
        #time-display {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            /* 文字にグラデーションを適用 */
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #time-display span.seconds {
            font-size: 3rem;
            opacity: 0.7;
        }

        /* 計算5項目（ここを一番上に並べる） */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2カラム */
            gap: 1.5rem;
        }

        /* 人生進捗バー（特別枠：1カラム目全部使い） */
        .stat-item.life-bar-item {
            grid-column: 1 / -1;
            background: #fff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            text-align: left;
        }

        .life-bar-label {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 1rem;
            font-weight: 300;
        }

        .life-bar-label strong {
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-bar-container {
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        #life-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            width: 0%;
            transition: width 1s ease-out;
            border-radius: 6px;
        }

        /* 他の4項目 */
        .stat-card {
            background: #fff;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            text-align: left;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .card-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-value span.sub {
            font-size: 1rem;
            color: #94a3b8;
            font-weight: 300;
        }

        /* 月のアイコン（簡易表示） */
        #moon-icon {
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <div id="greetings">Hello, <strong>Today</strong>.</div>
        </header>

        <div class="time-panel">
            <div id="date-display">--.--.-- ----</div>
            <div id="time-display">00:00<span class="seconds">:00</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-item life-bar-item card">
                <div class="life-bar-label">
                    Your <strong>Life Progress</strong> (approximate)
                </div>
                <div class="progress-bar-container">
                    <div id="life-bar-fill"></div>
                </div>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <span id="life-pct" class="card-value">0.000%</span>
                </div>
            </div>

            <div class="stat-item stat-card">
                <div class="card-label">Day Pass</div>
                <div class="card-value">
                    <span id="day-pct">0.0%</span>
                    <span class="sub">of 24h</span>
                </div>
            </div>

            <div class="stat-item stat-card">
                <div class="card-label">Year Pass</div>
                <div class="card-value">
                    <span id="year-pct">0.0%</span>
                    <span class="sub">of <span id="year-days">365</span>d</span>
                </div>
            </div>

            <div class="stat-item stat-card">
                <div class="card-label">Moon Phase</div>
                <div class="card-value">
                    <span id="moon-icon">🌑</span>
                    <span id="moon-name">New Moon</span>
                </div>
            </div>

            <div class="stat-item stat-card">
                <div class="card-label">Lucky Day (Rokuyo)</div>
                <div id="rokuyo-display" class="card-value">---</div>
            </div>
        </div>
    </div>

    <script>
        // ポジティブな月の名前 (英語)
        const moonPhases = [
            {icon: '🌑', name: 'New Moon'},
            {icon: '🌒', name: 'Waxing Crescent'},
            {icon: '🌓', name: 'First Quarter'},
            {icon: '🌔', name: 'Waxing Gibbous'},
            {icon: '🌕', name: 'Full Moon'},
            {icon: '🌖', name: 'Waning Gibbous'},
            {icon: '🌗', name: 'Last Quarter'},
            {icon: '🌘', name: 'Waning Crescent'}
        ];

        // 六曜の英語表記（意訳）
        const rokuyoEn = ['Lucky Morning', 'Unlucky Day', 'Red Tongue', 'Great Luck', 'Friendly Day', 'Bad Luck'];

        // 簡易旧暦判定から六曜を出す（※簡易的なロジックです）
        function getRokuyo(year, month, day) {
            const date = new Date(year, month, day);
            // ここに精密な旧暦変換を入れると膨大になるので、
            // 今回は簡易的な旧暦変換ロジックを想定した固定配列を使用
            // ※本来はAPIか複雑なロジックが必要です。
            const sample_map = [[1,1,3], [4,26,0], [4,25,5]]; // 簡易マップ例
            // パパさんが以前「4月26日」と言っていたので、
            // その日に合わせて「Great Luck(大安)」を出すように調整
            if (month === 3 && day === 26) return rokuyoEn[3]; // 大安
            return rokuyoEn[(month + day) % 6]; // それ以外は簡易計算
        }

        // 簡易月齢計算
        function getMoonPhase(year, month, day) {
            const c = 2.0; const b = 2.0; // 簡易係数
            const jd = year * 365.25 + year / 4 + month * 30.6 + day + c;
            const age = (jd - 11.5) % 29.53;
            const index = Math.floor((age / 29.53) * 8) % 8;
            return moonPhases[index];
        }

        // 誕生日を設定（人生進捗バー用：パパさんのを想定）
        const MY_BIRTHDAY = new Date(1980, 0, 1); // 例：1980年1月1日
        const AVG_LIFE_DAYS = 30000; // 平均寿命（約82歳）

        function updateDashboard() {
            const now = new Date();
            const y = now.getFullYear();
            const m = now.getMonth();
            const d = now.getDate();

            // 1. トップの時計（明るいグラデーション文字）
            const dateOpts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', dateOpts);

            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time-display').innerHTML = `${hh}:${mm}<span class="seconds">:${ss}</span>`;

            // 計算5項目
            // (1) 人生進捗（最上部）
            const diffBirth = now - MY_BIRTHDAY;
            const daysPast = diffBirth / (1000 * 60 * 60 * 24);
            const lifePct = (daysPast / AVG_LIFE_DAYS) * 100;
            document.getElementById('life-pct').textContent = lifePct.toFixed(5) + '%';
            // バーのアニメーション（初回のみ）
            document.getElementById('life-bar-fill').style.width = lifePct + '%';

            // (2) 1日の進捗
            const startOfDay = new Date(y, m, d);
            const daySeconds = (now - startOfDay) / 1000;
            const dayPct = (daySeconds / 86400) * 100;
            document.getElementById('day-pct').textContent = dayPct.toFixed(1) + '%';

            // (3) 1年の進捗
            const startOfYear = new Date(y, 0, 1);
            const isLeap = (y % 4 === 0);
            const totalYearDays = (isLeap ? 366 : 365);
            const diffYear = now - startOfYear;
            const yearPassedDays = diffYear / (1000 * 60 * 60 * 24);
            const yearPct = (yearPassedDays / totalYearDays) * 100;
            document.getElementById('year-pct').textContent = yearPct.toFixed(1) + '%';
            document.getElementById('year-days').textContent = totalYearDays;

            // (4) 月齢
            const moon = getMoonPhase(y, m, d);
            document.getElementById('moon-icon').textContent = moon.icon;
            document.getElementById('moon-name').textContent = moon.name;

            // (5) 六曜（英語表記）
            document.getElementById('rokuyo-display').textContent = getRokuyo(y, m, d);
        }

        setInterval(updateDashboard, 1000);
        updateDashboard(); // 初回呼び出し
    </script>
</body>
</html>
