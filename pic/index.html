<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logical Reset | Pro</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.5s; }
        header { padding: 10px; background: #1e293b; width: 100%; text-align: center; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
        .difficulty-selector { display: flex; gap: 5px; margin: 8px 0; justify-content: center; }
        .diff-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 12px; }
        .active-diff { background: var(--filled); border-color: var(--filled); }

        .game-container { flex: 1; width: 100%; overflow: auto; display: block; padding: 20px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; gap: 0; border: 1.5px solid #64748b; background: var(--border); margin: 0 auto; width: max-content; transition: 0.5s; }
        
        .cell { background: #1e293b; border: 0.5px solid var(--border); box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        .hint-v { background: #161e2e; border: 0.5px solid var(--border); font-size: 10px; color: var(--hint); display: flex; flex-direction: column; justify-content: flex-end; align-items: center; line-height: 1.1; padding-bottom: 3px; }
        .hint-h { background: #161e2e; border: 0.5px solid var(--border); font-size: 10px; color: var(--hint); display: flex; justify-content: flex-end; align-items: center; padding-right: 5px; font-weight: bold; }
        
        .v-line { border-right: 2px solid #94a3b8 !important; }
        .h-line { border-bottom: 2px solid #94a3b8 !important; }
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 18px; font-weight: bold; }

        /* クリア後の演出用スタイル */
        #msg { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; border-radius: 20px; text-align: center; display: none; z-index: 2000; border: 2px solid var(--filled); box-shadow: 0 0 30px rgba(0,0,0,0.8); width: 240px; backdrop-filter: blur(4px); }
        .reset-btn { margin-top: 10px; padding: 8px 20px; background: var(--filled); border: none; border-radius: 10px; color: white; font-weight: bold; }
        
        .cleared-overlay { opacity: 0.3; pointer-events: none; }
        .controls { display: flex; gap: 30px; padding: 20px; background: #1e293b; width: 100%; justify-content: center; border-top: 1px solid var(--border); flex-shrink: 0; z-index: 10; transition: 0.3s; }
        .mode-btn { width: 60px; height: 60px; border-radius: 15px; border: 2px solid var(--border); background: #0f172a; font-size: 28px; display: flex; align-items: center; justify-content: center; }
        .active-mode { border-color: var(--filled); background: #334155; }
    </style>
</head>
<body>
<header id="main-header">
    <div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">🧠 LOGICAL RESET</div>
    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(5)">5x5</button>
        <button class="diff-btn" onclick="changeDifficulty(10)">10x10</button>
        <button class="diff-btn" onclick="changeDifficulty(15)">15x15</button>
    </div>
</header>

<div class="game-container">
    <div id="game-grid" class="grid"></div>
</div>

<div id="msg">
    <div id="msg-text"></div>
    <button class="reset-btn" onclick="location.reload()">NEXT STAGE</button>
</div>

<div class="controls" id="main-controls">
    <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
    <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
</div>

<script>
    let currentMode = 'fill';
    let currentSize = 15;
    let levelData = [], colorMap = [], levelTitle = "";
    let allLevels = null;

    async function init() {
        try {
            const res = await fetch('levels.json');
            allLevels = await res.json();
            changeDifficulty(15);
        } catch (e) { alert("JSON Read Error"); }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-fill').classList.toggle('active-mode', m === 'fill');
        document.getElementById('btn-x').classList.toggle('active-mode', m === 'x');
    }

    function changeDifficulty(size) {
        if (!allLevels) return;
        currentSize = size;
        document.getElementById('msg').style.display = 'none';
        // 演出リセット
        document.getElementById('main-header').classList.remove('cleared-overlay');
        document.getElementById('main-controls').classList.remove('cleared-overlay');
        
        const pool = allLevels[`size${size}`];
        const selected = pool[Math.floor(Math.random() * pool.length)];
        levelData = selected.data;
        colorMap = selected.colorMap;
        levelTitle = selected.title;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active-diff', b.innerText.includes(size)));
        render();
    }

    function render() {
        const container = document.getElementById('game-grid');
        container.innerHTML = '';
        const cellSize = currentSize === 15 ? 28 : (currentSize === 10 ? 35 : 55);
        const hW = 50, hH = 70;
        container.style.gridTemplateColumns = `${hW}px repeat(${currentSize}, ${cellSize}px)`;
        const corner = document.createElement('div');
        corner.style.height = hH + 'px';
        container.appendChild(corner);

        for(let j=0; j<currentSize; j++) {
            const h = document.createElement('div');
            h.className = 'hint-v';
            h.style.width = cellSize + 'px';
            if((j+1)%5===0 && j!==currentSize-1) h.classList.add('v-line');
            let col = []; for(let i=0; i<currentSize; i++) col.push(levelData[i][j]);
            h.innerHTML = getHints(col).join("<br>");
            container.appendChild(h);
        }

        for(let i=0; i<currentSize; i++) {
            const rh = document.createElement('div');
            rh.className = 'hint-h';
            rh.style.height = cellSize + 'px';
            if((i+1)%5===0 && i!==currentSize-1) rh.classList.add('h-line');
            rh.innerText = getHints(levelData[i]).join(" ");
            container.appendChild(rh);

            for(let j=0; j<currentSize; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                if((j+1)%5===0 && j!==currentSize-1) cell.classList.add('v-line');
                if((i+1)%5===0 && i!==currentSize-1) cell.classList.add('h-line');
                
                cell.addEventListener('pointerdown', (e) => {
                    if(document.getElementById('msg').style.display === 'block') return;
                    if(currentMode === 'fill') { cell.classList.remove('mark-x'); cell.classList.toggle('filled'); }
                    else { cell.classList.remove('filled'); cell.classList.toggle('mark-x'); }
                    check();
                });
                container.appendChild(cell);
            }
        }
    }

    function getHints(arr) {
        let h = [], c = 0;
        arr.forEach(v => { if(v===1) c++; else if(c>0){ h.push(c); c=0; } });
        if(c>0) h.push(c);
        return h.length ? h : [0];
    }

    function check() {
        const cells = document.querySelectorAll('.cell');
        let ok = true;
        cells.forEach((cell, idx) => {
            const r = Math.floor(idx / currentSize), c = idx % currentSize;
            const filled = cell.classList.contains('filled');
            if((levelData[r][c]===1 && !filled) || (levelData[r][c]===0 && filled)) ok = false;
        });

        if(ok) {
            // クリア演出：ヘッダーと操作パネルを暗く
            document.getElementById('main-header').classList.add('cleared-overlay');
            document.getElementById('main-controls').classList.add('cleared-overlay');

            cells.forEach((cell, idx) => {
                const r = Math.floor(idx / currentSize), c = idx % currentSize;
                const col = colorMap[r][c];
                if(col !== 0 && col !== null) {
                    cell.style.setProperty('background-color', col, 'important');
                    cell.style.borderColor = "transparent";
                } else {
                    cell.style.opacity = "0.1";
                    cell.classList.remove('mark-x');
                }
            });
            document.getElementById('msg-text').innerHTML = `MISSION COMPLETE!<br><span style="color:#94a3b8; font-size:0.9em;">「${levelTitle}」</span>`;
            document.getElementById('msg').style.display = 'block';
        }
    }
    window.oncontextmenu = (e) => e.preventDefault();
    init();
</script>
</body>
</html>
