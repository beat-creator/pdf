<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logical Reset 15 | Self-Mgmt</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { padding: 15px; width: 100%; text-align: center; background: #1e293b; position: sticky; top: 0; z-index: 100; }

        /* スクロールを許可するコンテナ */
        .scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px 0;
            display: flex;
            justify-content: flex-start; /* 左端から開始 */
        }

        /* 盤面の最小幅を固定：15マス×25px + ヒント領域50px = 約425px */
        .grid { 
            display: grid; 
            grid-template-columns: 50px repeat(15, 25px); 
            gap: 1px; 
            background: var(--border); 
            padding: 2px;
            margin: 0 auto; /* 中央寄せ */
            min-width: 425px;
        }

        .cell { 
            width: 25px; height: 25px; 
            background: #1e293b; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
        }

        /* ヒントの崩れを防止 */
        .hint-v { background: transparent; font-size: 10px; color: var(--hint); display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 2px; height: 60px; }
        .hint-h { background: transparent; font-size: 10px; color: var(--hint); display: flex; justify-content: flex-end; align-items: center; padding-right: 5px; }
        
        /* 5マスごとの視覚的ガイド */
        .cell:nth-child(5n+1):not(.hint-h) { border-left: 1px solid #64748b; }
        .grid > div:nth-child(n+97):nth-child(-n+112), /* 5行目 */
        .grid > div:nth-child(n+177):nth-child(-n+192) { border-bottom: 2px solid #64748b; }

        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 20px; }
        
        /* コントロールパネルを固定 */
        .controls { display: flex; gap: 20px; padding: 20px; background: var(--bg); position: sticky; bottom: 0; width: 100%; justify-content: center; border-top: 1px solid var(--border); }
        .mode-btn { width: 60px; height: 60px; border-radius: 12px; border: 2px solid var(--border); background: #1e293b; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .active-mode { border-color: var(--filled); background: #334155; box-shadow: 0 0 15px rgba(59,130,246,0.4); }

        .clear-msg { color: #10b981; font-weight: bold; display: none; padding: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.9rem;">🧠 Logical Reset (15x15)</div>
</header>

<div class="scroll-wrapper">
    <div id="game-grid" class="grid">
        </div>
</div>

<div class="controls">
    <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
    <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
    <div id="clear-msg" class="clear-msg">COMPLETE!</div>
</div>

<script>
    let currentMode = 'fill';
    const size = 15;

    // テスト用の模様データ（中央を抜いた市松模様）
    const levelData = Array(size).fill().map((_, r) => 
        Array(size).fill().map((_, c) => (r+c)%2===0 && Math.abs(7-r)+Math.abs(7-c)<7 ? 1 : 0)
    );

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-fill').classList.toggle('active-mode', mode === 'fill');
        document.getElementById('btn-x').classList.toggle('active-mode', mode === 'x');
    }

    function getHints(arr) {
        let hints = [], count = 0;
        arr.forEach(v => {
            if (v === 1) count++;
            else if (count > 0) { hints.push(count); count = 0; }
        });
        if (count > 0) hints.push(count);
        return hints.length ? hints.join("<br>") : "0";
    }

    const container = document.getElementById('game-grid');
    
    // 1. 上部ヒントの生成
    container.appendChild(document.createElement('div')); // 左上
    for(let c=0; c<size; c++) {
        const h = document.createElement('div'); h.className = 'hint-v';
        let col = []; for(let r=0; r<size; r++) col.push(levelData[r][c]);
        h.innerHTML = getHints(col);
        container.appendChild(h);
    }

    // 2. 盤面の生成
    for(let r=0; r<size; r++) {
        const h = document.createElement('div'); h.className = 'hint-h';
        h.innerText = getHints(levelData[r]).replace(/<br>/g, " ");
        container.appendChild(h);

        for(let c=0; c<size; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (currentMode === 'fill') {
                    cell.classList.remove('mark-x');
                    cell.classList.toggle('filled');
                } else {
                    cell.classList.remove('filled');
                    cell.classList.toggle('mark-x');
                }
                checkClear();
            });
            container.appendChild(cell);
        }
    }

    function checkClear() {
        const cells = document.querySelectorAll('.cell');
        let isCorrect = true;
        cells.forEach((cell, i) => {
            const r = Math.floor(i / size), c = i % size;
            const isFilled = cell.classList.contains('filled');
            if (levelData[r][c] === 1 && !isFilled) isCorrect = false;
            if (levelData[r][c] === 0 && isFilled) isCorrect = false;
        });
        if (isCorrect) document.getElementById('clear-msg').style.display = 'block';
    }
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
