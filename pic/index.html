<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logical Reset | Pro</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        header { padding: 10px; background: #1e293b; width: 100%; text-align: center; border-bottom: 1px solid var(--border); }
        .difficulty-selector { display: flex; gap: 5px; margin: 8px 0; justify-content: center; }
        .diff-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: #1e293b; color: white; cursor: pointer; font-size: 12px; }
        .active-diff { background: var(--filled); border-color: var(--filled); }

        /* 盤面エリアの最適化 */
        .game-container { flex: 1; width: 100%; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 10px; box-sizing: border-box; }
        .grid { display: grid; gap: 0; border: 1.5px solid #64748b; background: var(--border); }
        .cell { background: #1e293b; border: 0.5px solid var(--border); box-sizing: border-box; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* ヒント周りの調整 */
        .hint-v { background: #161e2e; border: 0.5px solid var(--border); font-size: 9px; color: var(--hint); display: flex; flex-direction: column; justify-content: flex-end; align-items: center; line-height: 1; padding-bottom: 2px; }
        .hint-h { background: #161e2e; border: 0.5px solid var(--border); font-size: 9px; color: var(--hint); display: flex; justify-content: flex-end; align-items: center; padding-right: 3px; font-weight: bold; line-height: 1; }
        
        .v-line { border-right: 2px solid #94a3b8 !important; }
        .h-line { border-bottom: 2px solid #94a3b8 !important; }
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 16px; font-weight: bold; line-height: 1; }

        /* メッセージ表示を下に逃がす */
        #msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.95); color: white; padding: 15px 25px; border-radius: 15px; text-align: center; display: none; z-index: 1000; border: 2px solid var(--filled); box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px; }
        .reset-btn { margin-top: 10px; padding: 8px 20px; background: var(--filled); border: none; border-radius: 8px; color: white; font-weight: bold; }

        .controls { display: flex; gap: 20px; padding: 15px; background: #1e293b; width: 100%; justify-content: center; border-top: 1px solid var(--border); }
        .mode-btn { width: 55px; height: 55px; border-radius: 12px; border: 2px solid var(--border); background: #0f172a; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .active-mode { border-color: var(--filled); background: #1e293b; }
    </style>
</head>
<body>
<header>
    <div style="font-size: 14px; font-weight: bold;">🧠 LOGICAL RESET</div>
    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(5)">5x5</button>
        <button class="diff-btn" onclick="changeDifficulty(10)">10x10</button>
        <button class="diff-btn" onclick="changeDifficulty(15)">15x15</button>
    </div>
</header>

<div class="game-container">
    <div id="game-grid" class="grid"></div>
</div>

<div id="msg">
    <div id="msg-text"></div>
    <button class="reset-btn" onclick="location.reload()">NEXT STAGE</button>
</div>

<div class="controls">
    <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
    <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
</div>

<script>
    let currentMode = 'fill';
    let currentSize = 15;
    let levelData = [], colorMap = [], levelTitle = "";
    let allLevels = null;

    async function init() {
        try {
            const res = await fetch('levels.json');
            allLevels = await res.json();
            changeDifficulty(15);
        } catch (e) { alert("levels.json Read Error"); }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-fill').classList.toggle('active-mode', m === 'fill');
        document.getElementById('btn-x').classList.toggle('active-mode', m === 'x');
    }

    function changeDifficulty(size) {
        if (!allLevels) return;
        currentSize = size;
        document.getElementById('msg').style.display = 'none';
        const pool = allLevels[`size${size}`];
        const selected = pool[Math.floor(Math.random() * pool.length)];
        levelData = selected.data;
        colorMap = selected.colorMap;
        levelTitle = selected.title;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active-diff', b.innerText.includes(size)));
        render();
    }

    function render() {
        const container = document.getElementById('game-grid');
        container.innerHTML = '';
        
        // 画面幅に合わせてマスサイズを自動調整（スマホ最適化）
        const screenWidth = window.innerWidth - 40;
        const hintSpace = 40; 
        const cellSize = Math.floor((screenWidth - hintSpace) / currentSize);
        const limitedSize = Math.min(cellSize, currentSize === 15 ? 20 : 40); // 最大サイズ制限
        
        const hW = 40, hH = 60;
        container.style.gridTemplateColumns = `${hW}px repeat(${currentSize}, ${limitedSize}px)`;

        const corner = document.createElement('div');
        corner.style.height = hH + 'px';
        container.appendChild(corner);

        for(let j=0; j<currentSize; j++) {
            const h = document.createElement('div');
            h.className = 'hint-v';
            h.style.width = limitedSize + 'px';
            if((j+1)%5===0 && j!==currentSize-1) h.classList.add('v-line');
            let col = []; for(let i=0; i<currentSize; i++) col.push(levelData[i][j]);
            h.innerHTML = getHints(col).join("<br>");
            container.appendChild(h);
        }

        for(let i=0; i<currentSize; i++) {
            const rh = document.createElement('div');
            rh.className = 'hint-h';
            rh.style.height = limitedSize + 'px';
            if((i+1)%5===0 && i!==currentSize-1) rh.classList.add('h-line');
            rh.innerText = getHints(levelData[i]).join(" ");
            container.appendChild(rh);

            for(let j=0; j<currentSize; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = limitedSize + 'px';
                cell.style.height = limitedSize + 'px';
                if((j+1)%5===0 && j!==currentSize-1) cell.classList.add('v-line');
                if((i+1)%5===0 && i!==currentSize-1) cell.classList.add('h-line');
                
                cell.addEventListener('pointerdown', (e) => {
                    if(document.getElementById('msg').style.display === 'block') return;
                    e.preventDefault();
                    if(currentMode === 'fill') { cell.classList.remove('mark-x'); cell.classList.toggle('filled'); }
                    else { cell.classList.remove('filled'); cell.classList.toggle('mark-x'); }
                    check();
                });
                container.appendChild(cell);
            }
        }
    }

    function getHints(arr) {
        let h = [], c = 0;
        arr.forEach(v => { if(v===1) c++; else if(c>0){ h.push(c); c=0; } });
        if(c>0) h.push(c);
        return h.length ? h : [0];
    }

    function check() {
        const cells = document.querySelectorAll('.cell');
        let ok = true;
        cells.forEach((cell, idx) => {
            const r = Math.floor(idx / currentSize), c = idx % currentSize;
            const filled = cell.classList.contains('filled');
            if((levelData[r][c]===1 && !filled) || (levelData[r][c]===0 && filled)) ok = false;
        });

        if(ok) {
            cells.forEach((cell, idx) => {
                const r = Math.floor(idx / currentSize), c = idx % currentSize;
                const col = colorMap[r][c];
                if(col !== 0 && col !== null) {
                    cell.style.setProperty('background-color', col, 'important');
                    cell.style.borderColor = "transparent";
                } else {
                    cell.style.opacity = "0.1";
                    cell.classList.remove('mark-x');
                }
            });
            document.getElementById('msg-text').innerHTML = `COMPLETE!<br><small>「${levelTitle}」</small>`;
            document.getElementById('msg').style.display = 'block';
        }
    }
    window.oncontextmenu = (e) => e.preventDefault();
    init();
</script>
</body>
</html>
