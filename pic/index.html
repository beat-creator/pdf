<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logical Reset 15 | Self-Mgmt</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* スクロール用 */
        .scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px 0;
            display: flex;
        }

        /* 盤面：gapを0にしてborderで線を表現 */
        .grid { 
            display: grid; 
            grid-template-columns: 60px repeat(15, 26px); 
            gap: 0; 
            margin: 0 auto;
            border: 1px solid var(--border); /* 外枠 */
        }

        .cell { 
            width: 26px; height: 26px; 
            background: #1e293b; 
            border: 0.5px solid var(--border); /* 均一な細線 */
            box-sizing: border-box; /* サイズ計算を安定させる */
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
        }

        /* ヒント領域のスタイル */
        .hint-v { 
            height: 80px; background: #161e2e; border: 0.5px solid var(--border); 
            font-size: 10px; color: var(--hint); display: flex; flex-direction: column; 
            justify-content: flex-end; align-items: center; padding-bottom: 4px; box-sizing: border-box;
        }
        .hint-h { 
            width: 60px; background: #161e2e; border: 0.5px solid var(--border); 
            font-size: 10px; color: var(--hint); display: flex; 
            justify-content: flex-end; align-items: center; padding-right: 6px; box-sizing: border-box;
        }
        
        /* 5マスごとのガイドライン（少し色を明るくして太く見せる） */
        .v-line { border-right: 2px solid #64748b; }
        .h-line { border-bottom: 2px solid #64748b; }

        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 20px; }
        
        .controls { display: flex; gap: 20px; padding: 20px; background: var(--bg); position: sticky; bottom: 0; width: 100%; justify-content: center; border-top: 1px solid var(--border); }
        .mode-btn { width: 64px; height: 64px; border-radius: 16px; border: 2px solid var(--border); background: #1e293b; font-size: 28px; display: flex; align-items: center; justify-content: center; }
        .active-mode { border-color: var(--filled); background: #334155; }
    </style>
</head>
<body>

<header style="padding:10px; background:#1e293b; width:100%; text-align:center;">
    <div style="font-size: 0.9rem;">🧠 Logical Reset (15x15)</div>
</header>

<div class="scroll-wrapper">
    <div id="game-grid" class="grid"></div>
</div>

<div class="controls">
    <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
    <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
</div>

<script>
    let currentMode = 'fill';
    const size = 15;

    // サンプルデータ
    const levelData = Array(size).fill().map((_, r) => 
        Array(size).fill().map((_, c) => (r+c)%2===0 && Math.abs(7-r)+Math.abs(7-c)<8 ? 1 : 0)
    );

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-fill').classList.toggle('active-mode', mode === 'fill');
        document.getElementById('btn-x').classList.toggle('active-mode', mode === 'x');
    }

    function getHints(arr) {
        let hints = [], count = 0;
        arr.forEach(v => {
            if (v === 1) count++;
            else if (count > 0) { hints.push(count); count = 0; }
        });
        if (count > 0) hints.push(count);
        return hints.length ? hints.join("<br>") : "0";
    }

    const container = document.getElementById('game-grid');
    
    // 左上
    const corner = document.createElement('div');
    corner.style.background = "#161e2e";
    corner.style.border = "0.5px solid var(--border)";
    container.appendChild(corner);

    // 上ヒント
    for(let c=0; c<size; c++) {
        const h = document.createElement('div'); h.className = 'hint-v';
        if ((c + 1) % 5 === 0 && c !== size-1) h.classList.add('v-line');
        let col = []; for(let r=0; r<size; r++) col.push(levelData[r][c]);
        h.innerHTML = getHints(col);
        container.appendChild(h);
    }

    // 盤面生成
    for(let r=0; r<size; r++) {
        const h = document.createElement('div'); h.className = 'hint-h';
        if ((r + 1) % 5 === 0 && r !== size-1) h.classList.add('h-line');
        h.innerText = getHints(levelData[r]).replace(/<br>/g, " ");
        container.appendChild(h);

        for(let c=0; c<size; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            // 5マスごとの区切り
            if ((c + 1) % 5 === 0 && c !== size-1) cell.classList.add('v-line');
            if ((r + 1) % 5 === 0 && r !== size-1) cell.classList.add('h-line');
            
            cell.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (currentMode === 'fill') {
                    cell.classList.remove('mark-x');
                    cell.classList.toggle('filled');
                } else {
                    cell.classList.remove('filled');
                    cell.classList.toggle('mark-x');
                }
                checkClear();
            });
            container.appendChild(cell);
        }
    }

    function checkClear() {
        const cells = document.querySelectorAll('.cell');
        let isCorrect = true;
        cells.forEach((cell, i) => {
            const r = Math.floor(i / size), c = i % size;
            const isFilled = cell.classList.contains('filled');
            if (levelData[r][c] === 1 && !isFilled) isCorrect = false;
            if (levelData[r][c] === 0 && isFilled) isCorrect = false;
        });
        if (isCorrect) alert("MISSION COMPLETE!");
    }
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
