<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logical Reset | Pro</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #1e293b; width: 100%; text-align: center; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; }
        .difficulty-selector { display: flex; gap: 8px; margin: 8px 0; justify-content: center; }
        .diff-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .active-diff { background: var(--filled); border-color: var(--filled); font-weight: bold; }

        /* ステージセレクト画面 */
        #menu-screen { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; align-content: start; }
        .level-card { background: #1e293b; border: 2px solid var(--border); aspect-ratio: 1 / 1; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.2s; box-sizing: border-box; }
        .level-card:active { transform: scale(0.92); background: #334155; }
        .level-card.cleared { border-color: var(--success); background: rgba(34, 197, 94, 0.05); }
        .badge { position: absolute; top: -8px; right: -8px; background: var(--success); color: white; font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 2; }
        .level-num { font-size: 18px; font-weight: bold; color: white; }
        .level-title { font-size: 10px; margin-top: 4px; color: var(--hint); width: 90%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ゲーム画面 */
        #game-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .game-container { flex: 1; width: 100%; overflow: auto; padding: 20px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; gap: 0; border: 1.5px solid #64748b; background: var(--border); margin: 0 auto; width: max-content; }
        .cell { background: #1e293b; border: 0.5px solid var(--border); box-sizing: border-box; }
        .hint-v { background: #161e2e; border: 0.5px solid var(--border); font-size: 10px; color: var(--hint); display: flex; flex-direction: column; justify-content: flex-end; align-items: center; line-height: 1.1; }
        .hint-h { background: #161e2e; border: 0.5px solid var(--border); font-size: 10px; color: var(--hint); display: flex; justify-content: flex-end; align-items: center; padding-right: 5px; }
        .v-line { border-right: 2px solid #94a3b8 !important; }
        .h-line { border-bottom: 2px solid #94a3b8 !important; }
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 18px; font-weight: bold; }

        /* クリア演出 */
        #msg { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.98); color: white; padding: 20px; border-radius: 20px; text-align: center; display: none; z-index: 2000; border: 2px solid var(--success); width: 260px; backdrop-filter: blur(8px); }
        .back-btn { margin-top: 12px; padding: 10px 24px; background: var(--success); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .controls { display: flex; gap: 30px; padding: 20px; background: #1e293b; width: 100%; justify-content: center; border-top: 1px solid var(--border); flex-shrink: 0; }
        .mode-btn { width: 60px; height: 60px; border-radius: 18px; border: 2px solid var(--border); background: #0f172a; font-size: 28px; display: flex; align-items: center; justify-content: center; }
        .active-mode { border-color: var(--filled); background: #334155; }
        .cleared-overlay { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>
<header id="main-header">
    <div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">🧠 LOGICAL RESET</div>
    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(5)">5x5</button>
        <button class="diff-btn" onclick="changeDifficulty(10)">10x10</button>
        <button class="diff-btn" onclick="changeDifficulty(15)">15x15</button>
    </div>
</header>

<div id="menu-screen"></div>

<div id="game-screen">
    <div class="game-container"><div id="game-grid" class="grid"></div></div>
    <div class="controls" id="game-controls">
        <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
        <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
    </div>
</div>

<div id="msg">
    <div id="msg-text"></div>
    <button class="back-btn" onclick="backToMenu()">STAGE LIST</button>
</div>

<script>
    let currentMode = 'fill', currentSize = 5, currentLevelId = null;
    let levelData = [], colorMap = [], levelTitle = "", allLevels = null;

    async function init() {
        try {
            const res = await fetch('levels.json');
            allLevels = await res.json();
            showMenu(5);
        } catch (e) { alert("JSON Load Error"); }
    }

    function changeDifficulty(size) {
        currentSize = size;
        showMenu(size);
    }

    function showMenu(size) {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('msg').style.display = 'none';
        document.getElementById('main-header').classList.remove('cleared-overlay');
        const menu = document.getElementById('menu-screen');
        menu.style.display = 'grid';
        menu.innerHTML = '';
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active-diff', b.innerText.includes(size)));
        
        const pool = allLevels[`size${size}`] || [];
        const clearedList = JSON.parse(localStorage.getItem('cleared_levels') || '[]');

        pool.forEach((level, index) => {
            const isCleared = clearedList.includes(`${size}_${level.id}`);
            const card = document.createElement('div');
            card.className = `level-card ${isCleared ? 'cleared' : ''}`;
            card.innerHTML = `<div class="level-num">#${index + 1}</div><span class="level-title">${level.title}</span>${isCleared ? '<span class="badge">DONE ✅</span>' : ''}`;
            card.onclick = () => startLevel(level);
            menu.appendChild(card);
        });
    }

    function startLevel(level) {
        currentLevelId = level.id; levelData = level.data; colorMap = level.colorMap; levelTitle = level.title;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        render();
    }

    function backToMenu() { showMenu(currentSize); }
    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-fill').classList.toggle('active-mode', m === 'fill');
        document.getElementById('btn-x').classList.toggle('active-mode', m === 'x');
    }

    function render() {
        const container = document.getElementById('game-grid');
        container.innerHTML = '';
        const cellSize = currentSize === 15 ? 26 : (currentSize === 10 ? 35 : 55);
        const hW = 45, hH = 65;
        container.style.gridTemplateColumns = `${hW}px repeat(${currentSize}, ${cellSize}px)`;
        const corner = document.createElement('div'); corner.style.height = hH + 'px'; container.appendChild(corner);

        for(let j=0; j<currentSize; j++) {
            const h = document.createElement('div'); h.className = 'hint-v'; h.style.width = cellSize + 'px';
            if((j+1)%5===0 && j!==currentSize-1) h.classList.add('v-line');
            let col = []; for(let i=0; i<currentSize; i++) col.push(levelData[i][j]);
            h.innerHTML = getHints(col).join("<br>"); container.appendChild(h);
        }

        for(let i=0; i<currentSize; i++) {
            const rh = document.createElement('div'); rh.className = 'hint-h'; rh.style.height = cellSize + 'px';
            if((i+1)%5===0 && i!==currentSize-1) rh.classList.add('h-line');
            rh.innerText = getHints(levelData[i]).join(" "); container.appendChild(rh);
            for(let j=0; j<currentSize; j++) {
                const cell = document.createElement('div'); cell.className = 'cell'; cell.style.width = cellSize + 'px'; cell.style.height = cellSize + 'px';
                if((j+1)%5===0 && j!==currentSize-1) cell.classList.add('v-line');
                if((i+1)%5===0 && i!==currentSize-1) cell.classList.add('h-line');
                cell.addEventListener('pointerdown', () => {
                    if(document.getElementById('msg').style.display === 'block') return;
                    if(currentMode === 'fill') { cell.classList.remove('mark-x'); cell.classList.toggle('filled'); }
                    else { cell.classList.remove('filled'); cell.classList.toggle('mark-x'); }
                    check();
                });
                container.appendChild(cell);
            }
        }
    }

    function getHints(arr) {
        let h = [], c = 0; arr.forEach(v => { if(v===1) c++; else if(c>0){ h.push(c); c=0; } });
        if(c>0) h.push(c); return h.length ? h : [0];
    }

    function check() {
        const cells = document.querySelectorAll('.cell');
        let ok = true;
        cells.forEach((cell, idx) => {
            const r = Math.floor(idx / currentSize), c = idx % currentSize;
            const filled = cell.classList.contains('filled');
            if((levelData[r][c]===1 && !filled) || (levelData[r][c]===0 && filled)) ok = false;
        });
        if(ok) {
            const clearedList = JSON.parse(localStorage.getItem('cleared_levels') || '[]');
            const key = `${currentSize}_${currentLevelId}`;
            if(!clearedList.includes(key)) { clearedList.push(key); localStorage.setItem('cleared_levels', JSON.stringify(clearedList)); }
            document.getElementById('main-header').classList.add('cleared-overlay');
            document.getElementById('game-controls').classList.add('cleared-overlay');
            cells.forEach((cell, idx) => {
                const r = Math.floor(idx / currentSize), c = idx % currentSize;
                const col = colorMap[r][c];
                if(col !== 0) { cell.style.setProperty('background-color', col, 'important'); cell.style.borderColor = "transparent"; }
                else { cell.style.opacity = "0.1"; cell.classList.remove('mark-x'); }
            });
            document.getElementById('msg-text').innerHTML = `GREAT WORK!<br><span style="color:var(--success);">「${levelTitle}」</span>`;
            document.getElementById('msg').style.display = 'block';
        }
    }
    window.oncontextmenu = (e) => e.preventDefault();
    init();
</script>
</body>
</html>
