<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="数字をヒントにマスを塗る、大人のための無料お絵かきロジック（ピクロス）パズル。">
    <title>大人の脳トレ！お絵かきロジック | 無料ピクロス・パズル</title>
    <style>
        :root {
            --bg: #f2f4f7; --text: #1c1c1e; --accent: #007aff;
            --card: #ffffff; --border: #d1d1d6; --filled: #1c1c1e;
            --hint: #8e8e93; --success: #34c759; --danger: #ff3b30;
        }

        body {
            background: var(--bg); color: var(--text); 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        header { 
            padding: 15px; background: var(--card); text-align: center; 
            border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 1100;
            position: sticky; top: 0;
        }

        h1 { font-size: 16px; margin: 0; font-weight: 800; }

        .difficulty-selector { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
        .diff-btn { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); 
            background: var(--card); color: var(--hint); font-size: 13px; font-weight: bold;
            cursor: pointer; touch-action: manipulation;
        }
        .diff-btn.active-diff { background: var(--accent); border-color: var(--accent); color: white; }

        #menu-screen { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .level-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 15px; width: 100%; max-width: 400px;
        }
        .level-card { 
            background: var(--card); border: 2px solid transparent; aspect-ratio: 1/1; 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative;
        }
        .level-card.cleared { border-color: var(--success); background: #f0fff4; }
        .level-card.cleared::after {
            content: "完了"; position: absolute; top: -5px; right: -5px; 
            background: var(--success); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px;
        }

        #game-screen { display: none; flex-direction: column; align-items: center; padding-bottom: 160px; }
        .game-container { width: 100%; overflow: auto; padding: 20px 10px; display: flex; justify-content: flex-start; }
        .grid { display: grid; background: #636366; border: 2px solid #636366; width: max-content; }
        .cell { background: var(--card); border: 0.5px solid #aeaeb2; box-sizing: border-box; touch-action: none; }
        
        .hint-v, .hint-h { background: #e5e5ea; font-size: 10px; color: #3a3a3c; font-weight: bold; position: sticky; z-index: 10; }
        .hint-v { top: 0; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 2px; }
        .hint-h { left: 0; display: flex; justify-content: flex-end; align-items: center; padding-right: 4px; }
        .corner { position: sticky; left: 0; top: 0; z-index: 20; background: #d1d1d6; }
        
        .v-line { border-right: 2.5px solid #636366 !important; }
        .h-line { border-bottom: 2.5px solid #636366 !important; }
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: var(--danger); font-size: 24px; font-weight: bold; }

        #msg { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; border-radius: 24px; padding: 30px 20px; text-align: center; 
            display: none; z-index: 3000; width: 80%; max-width: 300px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 3px solid var(--success); 
        }
        #clear-title { font-size: 20px; font-weight: 900; margin-bottom: 10px; display: block; }

        /* ボタン反応強化：pointer-events を確実に */
        .controls { 
            display: flex; gap: 50px; padding: 20px; background: var(--card); 
            justify-content: center; border-top: 1px solid var(--border); 
            position: fixed; bottom: 0; width: 100%; z-index: 2000; 
        }
        .mode-btn { 
            width: 75px; height: 75px; border-radius: 24px; border: 4px solid var(--border); 
            background: white; font-size: 32px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; 
            touch-action: none; /* スマホのジェスチャーを無効化して即時反応 */
            pointer-events: auto; /* 確実にクリックを受け取る */
        }
        .active-mode { border-color: var(--accent); background: #eef7ff; }
        .back-btn { margin-top: 15px; padding: 15px; background: var(--text); border: none; border-radius: 14px; color: white; font-weight: bold; width: 100%; }
        .cleared-overlay { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <h1>🎨 お絵かきロジック</h1>
    <div class="difficulty-selector">
        <button id="btn-size5" class="diff-btn" onpointerdown="changeDifficulty(5)">5x5</button>
        <button id="btn-size10" class="diff-btn" onpointerdown="changeDifficulty(10)">10x10</button>
        <button id="btn-size15" class="diff-btn" onpointerdown="changeDifficulty(15)">15x15</button>
    </div>
</header>

<main id="menu-screen">
    <div class="level-grid" id="level-list"></div>
</main>

<div id="game-screen">
    <div class="game-container"><div id="game-grid" class="grid"></div></div>
    <div class="controls" id="game-controls">
        <div id="mode-fill" class="mode-btn active-mode" onpointerdown="setMode('fill')">⬛</div>
        <div id="mode-x" class="mode-btn" onpointerdown="setMode('x')">❌</div>
    </div>
</div>

<div id="msg">
    <span style="font-size: 14px; color: var(--success); font-weight: bold;">STAGE CLEAR!</span>
    <span id="clear-title">タイトル</span>
    <button class="back-btn" onpointerdown="backToMenu()">ステージ一覧へ</button>
</div>

<script>
    let currentMode = 'fill', currentSize = 5, currentLevel = null;
    let levelData = [], colorMap = [], allLevels = null;

    async function init() {
        try {
            const res = await fetch('levels.json');
            allLevels = await res.json();
            changeDifficulty(5);
        } catch (e) { console.error("Load Error"); }
    }

    function changeDifficulty(size) {
        currentSize = size;
        document.getElementById('msg').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.toggle('active-diff', btn.id === `btn-size${size}`));

        const list = document.getElementById('level-list');
        list.innerHTML = '';
        const pool = allLevels ? (allLevels[`size${size}`] || []) : [];
        const clearedList = JSON.parse(localStorage.getItem('cleared_pic_levels') || '[]');

        pool.forEach((level, index) => {
            const isCleared = clearedList.includes(`${size}_${level.id}`);
            const card = document.createElement('div');
            card.className = `level-card ${isCleared ? 'cleared' : ''}`;
            card.innerHTML = `<div style="font-size:20px; font-weight:900;">${index + 1}</div>`;
            card.onpointerdown = () => startLevel(level);
            list.appendChild(card);
        });
    }

    function startLevel(level) {
        currentLevel = level; levelData = level.data; colorMap = level.colorMap;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('game-controls').classList.remove('cleared-overlay');
        window.scrollTo(0,0);
        render();
    }

    function backToMenu() { changeDifficulty(currentSize); }
    
    function setMode(m) {
        currentMode = m;
        document.getElementById('mode-fill').classList.toggle('active-mode', m === 'fill');
        document.getElementById('mode-x').classList.toggle('active-mode', m === 'x');
    }

    function render() {
        const container = document.getElementById('game-grid');
        container.innerHTML = '';
        const cellSize = currentSize === 15 ? 30 : (currentSize === 10 ? 38 : 55);
        const hW = 45, hH = 55;
        container.style.gridTemplateColumns = `${hW}px repeat(${currentSize}, ${cellSize}px)`;
        
        const corner = document.createElement('div');
        corner.className = 'corner';
        corner.style.height = hH + 'px'; container.appendChild(corner);

        for(let j=0; j<currentSize; j++) {
            const h = document.createElement('div'); h.className = 'hint-v'; h.style.width = cellSize + 'px';
            if((j+1)%5===0 && j!==currentSize-1) h.classList.add('v-line');
            let col = []; for(let i=0; i<currentSize; i++) col.push(levelData[i][j]);
            h.innerHTML = getHints(col).join("<br>"); container.appendChild(h);
        }

        for(let i=0; i<currentSize; i++) {
            const rh = document.createElement('div'); rh.className = 'hint-h'; rh.style.height = cellSize + 'px';
            if((i+1)%5===0 && i!==currentSize-1) rh.classList.add('h-line');
            rh.innerText = getHints(levelData[i]).join(" "); container.appendChild(rh);
            for(let j=0; j<currentSize; j++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                cell.style.width = cellSize + 'px'; cell.style.height = cellSize + 'px';
                if((j+1)%5===0 && j!==currentSize-1) cell.classList.add('v-line');
                if((i+1)%5===0 && i!==currentSize-1) cell.classList.add('h-line');
                
                cell.onpointerdown = (e) => {
                    if(document.getElementById('msg').style.display === 'block') return;
                    if(currentMode === 'fill') { cell.classList.remove('mark-x'); cell.classList.toggle('filled'); }
                    else { cell.classList.remove('filled'); cell.classList.toggle('mark-x'); }
                    check();
                };
                container.appendChild(cell);
            }
        }
    }

    function getHints(arr) {
        let h = [], c = 0; arr.forEach(v => { if(v===1) c++; else if(c>0){ h.push(c); c=0; } });
        if(c>0) h.push(c); return h.length ? h : [0];
    }

    function check() {
        const cells = document.querySelectorAll('.cell');
        let ok = true;
        cells.forEach((cell, idx) => {
            const r = Math.floor(idx / currentSize), c = idx % currentSize;
            const filled = cell.classList.contains('filled');
            if((levelData[r][c]===1 && !filled) || (levelData[r][c]===0 && filled)) ok = false;
        });
        if(ok) {
            const clearedList = JSON.parse(localStorage.getItem('cleared_pic_levels') || '[]');
            const key = `${currentSize}_${currentLevel.id}`;
            if(!clearedList.includes(key)) { clearedList.push(key); localStorage.setItem('cleared_pic_levels', JSON.stringify(clearedList)); }
            
            document.getElementById('game-controls').classList.add('cleared-overlay');
            document.getElementById('clear-title').innerText = `「${currentLevel.title}」`;

            cells.forEach((cell, idx) => {
                const r = Math.floor(idx / currentSize), c = idx % currentSize;
                const col = colorMap[r][c];
                if(col !== 0) { cell.style.setProperty('background-color', col, 'important'); cell.style.borderColor = "transparent"; }
                else { cell.style.opacity = "0.1"; cell.classList.remove('mark-x'); }
            });
            setTimeout(() => { document.getElementById('msg').style.display = 'block'; }, 400);
        }
    }
    window.oncontextmenu = (e) => e.preventDefault();
    init();
</script>
</body>
</html>
