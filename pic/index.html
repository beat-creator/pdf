<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logical Reset | Pro</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: manipulation; }
        header { padding: 15px; background: #1e293b; width: 100%; text-align: center; border-bottom: 1px solid var(--border); box-sizing: border-box; }
        .difficulty-selector { display: flex; gap: 8px; margin: 15px 0; justify-content: center; }
        .diff-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: #1e293b; color: white; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .active-diff { background: var(--filled); border-color: var(--filled); box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .scroll-wrapper { width: 100%; overflow-x: auto; padding: 10px 0 30px 0; display: flex; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; gap: 0; margin: 0 auto; border: 1.5px solid #64748b; background: var(--border); }
        .cell { background: #1e293b; border: 0.5px solid var(--border); box-sizing: border-box; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: background-color 0.1s; }
        .hint-v { background: #161e2e; border: 0.5px solid var(--border); font-size: 10px; color: var(--hint); display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 4px; box-sizing: border-box; font-weight: bold; line-height: 1.2; }
        .hint-h { background: #161e2e; border: 0.5px solid var(--border); font-size: 10px; color: var(--hint); display: flex; justify-content: flex-end; align-items: center; padding-right: 6px; box-sizing: border-box; font-weight: bold; }
        .v-line { border-right: 2px solid #94a3b8 !important; }
        .h-line { border-bottom: 2px solid #94a3b8 !important; }
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 20px; font-weight: bold; }
        .controls { display: flex; gap: 25px; padding: 20px; background: #1e293b; position: sticky; bottom: 0; width: 100%; justify-content: center; border-top: 1px solid var(--border); z-index: 100; box-sizing: border-box; }
        .mode-btn { width: 68px; height: 68px; border-radius: 18px; border: 3px solid var(--border); background: #0f172a; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .active-mode { border-color: var(--filled); background: #1e293b; transform: scale(1.05); }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.96); color: white; padding: 30px; border-radius: 24px; text-align: center; font-weight: bold; display: none; z-index: 1000; border: 2px solid var(--filled); box-shadow: 0 20px 50px rgba(0,0,0,0.7); pointer-events: auto; }
        .reset-btn { margin-top: 15px; padding: 8px 20px; background: var(--filled); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <div style="font-weight: bold; letter-spacing: 1px;">🧠 LOGICAL RESET</div>
    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(5)">5x5</button>
        <button class="diff-btn" onclick="changeDifficulty(10)">10x10</button>
        <button class="diff-btn" onclick="changeDifficulty(15)">15x15</button>
    </div>
</header>
<div class="scroll-wrapper">
    <div id="game-grid" class="grid"></div>
</div>
<div id="msg">
    <div id="msg-text">COMPLETE!</div>
    <button class="reset-btn" onclick="location.reload()">NEXT STAGE</button>
</div>
<div class="controls">
    <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
    <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
</div>
<script>
    let currentMode = 'fill';
    let currentSize = 15;
    let levelData = [], colorMap = [], levelTitle = "";
    let allLevels = null;

    async function init() {
        try {
            const res = await fetch('levels.json');
            allLevels = await res.json();
            changeDifficulty(15);
        } catch (e) {
            alert("levels.jsonを読み込めませんでした。GitHub Pages等のサーバー環境で実行してください。");
        }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-fill').classList.toggle('active-mode', m === 'fill');
        document.getElementById('btn-x').classList.toggle('active-mode', m === 'x');
    }

    function changeDifficulty(size) {
        if (!allLevels) return;
        currentSize = size;
        document.getElementById('msg').style.display = 'none';
        const pool = allLevels[`size${size}`];
        const selected = pool[Math.floor(Math.random() * pool.length)];
        levelData = selected.data;
        colorMap = selected.colorMap;
        levelTitle = selected.title;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active-diff', b.innerText.includes(size)));
        render();
    }

    function render() {
        const container = document.getElementById('game-grid');
        container.innerHTML = '';
        const cellSize = currentSize === 15 ? 24 : (currentSize === 10 ? 32 : 55);
        const hW = 55, hH = 75;
        container.style.gridTemplateColumns = `${hW}px repeat(${currentSize}, ${cellSize}px)`;

        // Corner
        const corner = document.createElement('div');
        corner.style.height = hH + 'px';
        corner.style.background = "#0f172a";
        container.appendChild(corner);

        // V-Hints
        for(let j=0; j<currentSize; j++) {
            const h = document.createElement('div');
            h.className = 'hint-v';
            h.style.width = cellSize + 'px';
            if((j+1)%5===0 && j!==currentSize-1) h.classList.add('v-line');
            let col = []; for(let i=0; i<currentSize; i++) col.push(levelData[i][j]);
            h.innerHTML = getHints(col).join("<br>");
            container.appendChild(h);
        }

        // Rows & Cells
        for(let i=0; i<currentSize; i++) {
            const rh = document.createElement('div');
            rh.className = 'hint-h';
            rh.style.height = cellSize + 'px';
            if((i+1)%5===0 && i!==currentSize-1) rh.classList.add('h-line');
            rh.innerText = getHints(levelData[i]).join(" ");
            container.appendChild(rh);

            for(let j=0; j<currentSize; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                if((j+1)%5===0 && j!==currentSize-1) cell.classList.add('v-line');
                if((i+1)%5===0 && i!==currentSize-1) cell.classList.add('h-line');
                
                cell.addEventListener('pointerdown', (e) => {
                    if(document.getElementById('msg').style.display === 'block') return;
                    e.preventDefault();
                    if(currentMode === 'fill') {
                        cell.classList.remove('mark-x');
                        cell.classList.toggle('filled');
                    } else {
                        cell.classList.remove('filled');
                        cell.classList.toggle('mark-x');
                    }
                    check();
                });
                container.appendChild(cell);
            }
        }
    }

    function getHints(arr) {
        let h = [], c = 0;
        arr.forEach(v => { if(v===1) c++; else if(c>0){ h.push(c); c=0; } });
        if(c>0) h.push(c);
        return h.length ? h : [0];
    }

    function check() {
        const cells = document.querySelectorAll('.cell');
        let ok = true;
        cells.forEach((cell, idx) => {
            const r = Math.floor(idx / currentSize), c = idx % currentSize;
            const filled = cell.classList.contains('filled');
            if((levelData[r][c]===1 && !filled) || (levelData[r][c]===0 && filled)) ok = false;
        });

        if(ok) {
            cells.forEach((cell, idx) => {
                const r = Math.floor(idx / currentSize), c = idx % currentSize;
                const col = colorMap[r][c];
                if(col !== 0) {
                    cell.style.backgroundColor = col;
                    cell.style.borderColor = "transparent";
                } else {
                    cell.style.opacity = "0.2";
                    cell.classList.remove('mark-x');
                }
            });
            document.getElementById('msg-text').innerHTML = `MISSION COMPLETE!<br><span style="font-size:0.8em; color:#94a3b8; font-weight:normal;">「${levelTitle}」</span>`;
            document.getElementById('msg').style.display = 'block';
        }
    }
    window.oncontextmenu = (e) => e.preventDefault();
    init();
</script>
</body>
</html>
