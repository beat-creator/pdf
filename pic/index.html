<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logical Reset 15 | Self-Mgmt</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; --x-color: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: none; }
        
        /* 15x15用にサイズ調整：マスを20pxに */
        .grid { display: grid; grid-template-columns: 50px repeat(15, 20px); gap: 1px; background: var(--border); padding: 2px; }
        .cell { width: 20px; height: 20px; background: #1e293b; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; font-size: 10px; }
        
        /* 5マスごとの境界線 */
        .cell:nth-child(5n+1):not(.hint-h) { border-left: 1px solid #94a3b8; }
        .row-5n-border { border-bottom: 1px solid #94a3b8 !important; }

        .hint-v { background: transparent; font-size: 9px; flex-direction: column; color: var(--hint); pointer-events: none; line-height: 1; justify-content: flex-end; padding-bottom: 2px; }
        .hint-h { background: transparent; font-size: 9px; color: var(--hint); pointer-events: none; justify-content: flex-end; padding-right: 4px; }
        
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: var(--x-color); font-size: 16px; }
        
        /* 操作パネル */
        .controls { display: flex; gap: 20px; margin: 20px 0; }
        .mode-btn { width: 60px; height: 60px; border-radius: 12px; border: 2px solid var(--border); background: #1e293b; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .active-mode { border-color: var(--filled); background: #334155; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        .clear-msg { color: #10b981; font-weight: bold; display: none; text-align: center; }
    </style>
</head>
<body>
    <h2 style="font-size: 1rem; margin: 5px 0;">🧠 Logical Reset (15x15)</h2>
    
    <div id="game-grid" class="grid"></div>

    <div class="controls">
        <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
        <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
    </div>

    <div id="clear-msg" class="clear-msg">MISSION COMPLETE!</div>

    <script>
        let currentMode = 'fill'; // 'fill' or 'x'
        const size = 15;

        // 15x15のサンプル問題（中身をAIに作らせて差し替え可能）
        const levelData = Array(size).fill().map(() => Array(size).fill(0));
        // 適当に中央にひし形を作成（テスト用）
        for(let r=0; r<size; r++) for(let c=0; c<size; c++) if(Math.abs(7-r) + Math.abs(7-c) <= 5) levelData[r][c] = 1;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-fill').classList.toggle('active-mode', mode === 'fill');
            document.getElementById('btn-x').classList.toggle('active-mode', mode === 'x');
        }

        function getHints(arr) {
            let hints = [], count = 0;
            arr.forEach(v => {
                if (v === 1) count++;
                else if (count > 0) { hints.push(count); count = 0; }
            });
            if (count > 0) hints.push(count);
            return hints.length ? hints.join("\n") : "0";
        }

        const container = document.getElementById('game-grid');
        container.appendChild(document.createElement('div'));

        for(let c=0; c<size; c++) {
            const h = document.createElement('div'); h.className = 'cell hint-v';
            let col = []; for(let r=0; r<size; r++) col.push(levelData[r][c]);
            h.innerText = getHints(col);
            container.appendChild(h);
        }

        for(let r=0; r<size; r++) {
            const h = document.createElement('div'); h.className = 'cell hint-h';
            h.innerText = getHints(levelData[r]).replace(/\n/g, " ");
            container.appendChild(h);

            for(let c=0; c<size; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (r % 5 === 4 && r !== size-1) cell.classList.add('row-5n-border');
                
                cell.onpointerdown = (e) => {
                    e.preventDefault();
                    if (currentMode === 'fill') {
                        cell.classList.remove('mark-x');
                        cell.classList.toggle('filled');
                    } else {
                        cell.classList.remove('filled');
                        cell.classList.toggle('mark-x');
                    }
                    checkClear();
                };
                container.appendChild(cell);
            }
        }

        function checkClear() {
            const cells = document.querySelectorAll('.cell:not(.hint-h):not(.hint-v)');
            let isCorrect = true;
            cells.forEach((cell, i) => {
                const r = Math.floor(i / size), c = i % size;
                const isFilled = cell.classList.contains('filled');
                if (levelData[r][c] === 1 && !isFilled) isCorrect = false;
                if (levelData[r][c] === 0 && isFilled) isCorrect = false;
            });
            if (isCorrect) document.getElementById('clear-msg').style.display = 'block';
        }
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
