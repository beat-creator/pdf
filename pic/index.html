<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logical Reset 15 | Self-Mgmt</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --border: #475569; --filled: #3b82f6; --hint: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        
        /* 画面固定を解除し、スクロールを許可。ただしマス単体でのドラッグ選択は抑制 */
        .grid-container { overflow-x: auto; width: 100%; display: flex; justify-content: center; padding-bottom: 20px; }

        .grid { display: grid; grid-template-columns: 50px repeat(15, 22px); gap: 1px; background: var(--border); padding: 2px; }
        .cell { width: 22px; height: 22px; background: #1e293b; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        
        /* 5マスごとの境界を強調 */
        .cell:nth-child(5n+1):not(.hint-h) { border-left: 1px solid #64748b; }
        .row-5n-border { border-bottom: 2px solid #64748b !important; }

        .hint-v { background: transparent; font-size: 9px; flex-direction: column; color: var(--hint); pointer-events: none; line-height: 1.1; justify-content: flex-end; align-items: center; padding-bottom: 2px; }
        .hint-h { background: transparent; font-size: 9px; color: var(--hint); pointer-events: none; justify-content: flex-end; padding-right: 5px; }
        
        .filled { background: var(--filled) !important; }
        .mark-x::after { content: "×"; color: #ef4444; font-size: 16px; }
        
        .controls { display: flex; gap: 20px; margin: 20px 0; position: sticky; bottom: 20px; z-index: 100; }
        .mode-btn { width: 64px; height: 64px; border-radius: 16px; border: 2px solid var(--border); background: #1e293b; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .active-mode { border-color: var(--filled); background: #334155; }

        .clear-msg { color: #10b981; font-weight: bold; display: none; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <h2 style="font-size: 1.2rem; margin: 15px 0;">🧠 Logical Reset (15x15)</h2>
    
    <div class="grid-container">
        <div id="game-grid" class="grid"></div>
    </div>

    <div class="controls">
        <div id="btn-fill" class="mode-btn active-mode" onclick="setMode('fill')">🟦</div>
        <div id="btn-x" class="mode-btn" onclick="setMode('x')">❌</div>
    </div>

    <div id="clear-msg" class="clear-msg">MISSION COMPLETE!</div>

    <script>
        let currentMode = 'fill';
        const size = 15;

        // サンプル：市松模様のようなテストデータ
        const levelData = Array(size).fill().map((_, r) => Array(size).fill().map((_, c) => (r + c) % 3 === 0 ? 1 : 0));

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-fill').classList.toggle('active-mode', mode === 'fill');
            document.getElementById('btn-x').classList.toggle('active-mode', mode === 'x');
        }

        function getHints(arr) {
            let hints = [], count = 0;
            arr.forEach(v => {
                if (v === 1) count++;
                else if (count > 0) { hints.push(count); count = 0; }
            });
            if (count > 0) hints.push(count);
            return hints.length ? hints.join("\n") : "0";
        }

        const container = document.getElementById('game-grid');
        container.appendChild(document.createElement('div'));

        for(let c=0; c<size; c++) {
            const h = document.createElement('div'); h.className = 'cell hint-v';
            let col = []; for(let r=0; r<size; r++) col.push(levelData[r][c]);
            h.innerText = getHints(col);
            container.appendChild(h);
        }

        for(let r=0; r<size; r++) {
            const h = document.createElement('div'); h.className = 'cell hint-h';
            h.innerText = getHints(levelData[r]).replace(/\n/g, " ");
            container.appendChild(h);

            for(let c=0; c<size; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (r % 5 === 4 && r !== size-1) cell.classList.add('row-5n-border');
                
                // タッチ開始時に操作
                cell.addEventListener('pointerdown', (e) => {
                    if (currentMode === 'fill') {
                        cell.classList.remove('mark-x');
                        cell.classList.toggle('filled');
                    } else {
                        cell.classList.remove('filled');
                        cell.classList.toggle('mark-x');
                    }
                    checkClear();
                });
                container.appendChild(cell);
            }
        }

        function checkClear() {
            const cells = document.querySelectorAll('.cell:not(.hint-h):not(.hint-v)');
            let isCorrect = true;
            cells.forEach((cell, i) => {
                const r = Math.floor(i / size), c = i % size;
                const isFilled = cell.classList.contains('filled');
                if (levelData[r][c] === 1 && !isFilled) isCorrect = false;
                if (levelData[r][c] === 0 && isFilled) isCorrect = false;
            });
            if (isCorrect) document.getElementById('clear-msg').style.display = 'block';
        }
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
