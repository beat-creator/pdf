<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brain Puzzle V2.1</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        /* ヘッダー：タイマーと情報を表示 */
        #ui-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #timer { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: bold; color: #34d399; }
        button { padding: 6px 12px; border-radius: 5px; border: none; background: #34495e; color: white; cursor: pointer; }
        
        /* メイン：パズル盤面を中央に配置 */
        #game-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        canvas { max-width: 95vw; max-height: 70vh; aspect-ratio: 1 / 1; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-radius: 4px; touch-action: none; image-rendering: pixelated; }
        
        /* クリアメッセージ：画面下部に配置して画像を隠さない */
        #clear-overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: rgba(0,0,0,0.85); color: white; border-radius: 12px; padding: 20px; text-align: center; display: none; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        #clear-overlay h2 { margin: 0 0 10px; color: #34d399; }
        .btn-next { background: #34d399; color: #1a1a1a; font-weight: bold; margin-top: 10px; padding: 10px 20px; }
    </style>
</head>
<body>

<div id="ui-header">
    <button onclick="location.href='index.html'">戻る</button>
    <div id="timer">00:00</div>
    <div id="level-label">Level: 1-1</div>
</div>

<div id="game-main">
    <canvas id="puzzleCanvas"></canvas>
</div>

<div id="clear-overlay">
    <h2>正解！</h2>
    <p id="clear-stats"></p>
    <button class="btn-next" onclick="location.reload()">次の問題へ</button>
</div>

<script>
    const canvas = document.getElementById('puzzleCanvas');
    const ctx = canvas.getContext('2d');
    let startTime, timerInterval, isPlaying = false;

    // ゲーム初期化
    function init() {
        // 解像度設定（スマホの画質に合わせる）
        const dpr = window.devicePixelRatio || 1;
        const displaySize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.7);
        canvas.style.width = displaySize + 'px';
        canvas.style.height = displaySize + 'px';
        canvas.width = displaySize * dpr;
        canvas.height = displaySize * dpr;
        ctx.scale(dpr, dpr);

        startTimer();
        isPlaying = true;
        draw(); // ここに描画ロジックを呼び出す
    }

    // タイマー管理
    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    // 誤操作防止：pointerup (指を離した時) に反応
    canvas.addEventListener('pointerup', (e) => {
        if (!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        // handleTap(x, y); // ここでタップ判定ロジックを実行
    });

    // クリア処理
    function onGameClear() {
        clearInterval(timerInterval);
        isPlaying = false;
        const finalTime = document.getElementById('timer').innerText;
        document.getElementById('clear-stats').innerText = `クリアタイム: ${finalTime}`;
        document.getElementById('clear-overlay').style.display = 'block';
    }

    window.onload = init;
</script>
</body>
</html>
