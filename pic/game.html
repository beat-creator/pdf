<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brain Puzzle V2.1</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #2c3e50; color: white; }
        #timer { color: #34d399; font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        
        /* サイズ選択ボタン */
        #controls { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .size-btn { padding: 5px 15px; border: 1px solid #2c3e50; border-radius: 20px; background: white; cursor: pointer; }
        .size-btn.active { background: #2c3e50; color: white; }

        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 95vw; max-height: 60vh; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); touch-action: none; }
        
        #overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 10px; text-align: center; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="location.href='index.html'">戻る</button>
    <div id="timer">00:00</div>
    <div>Level: 1-1</div>
</div>

<div id="controls">
    <button class="size-btn" onclick="changeSize(5)">5x5</button>
    <button class="size-btn active" onclick="changeSize(10)">10x10</button>
    <button class="size-btn" onclick="changeSize(15)">15x15</button>
</div>

<div id="game-area">
    <canvas id="puzzleCanvas"></canvas>
</div>

<div id="overlay">
    <h2 style="margin:0">正解！</h2>
    <p id="stats"></p>
    <button onclick="location.reload()" style="background:#34d399; border:none; padding:10px 20px; font-weight:bold; border-radius:5px;">次へ</button>
</div>

<script>
    const canvas = document.getElementById('puzzleCanvas');
    const ctx = canvas.getContext('2d');
    let startTime, timerId, isPlaying = false;
    let currentSize = 10;

    function init() {
        const dpr = window.devicePixelRatio || 1;
        const displaySize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.6);
        canvas.style.width = displaySize + 'px';
        canvas.style.height = displaySize + 'px';
        canvas.width = displaySize * dpr;
        canvas.height = displaySize * dpr;
        ctx.scale(dpr, dpr);

        if(!isPlaying) startTimer();
        isPlaying = true;
        drawGrid(); // 盤面を描画
    }

    function changeSize(size) {
        currentSize = size;
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(size));
        });
        init(); // サイズを変えて再描画
    }

    function startTimer() {
        startTime = Date.now();
        timerId = setInterval(() => {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cellSize = canvas.width / (window.devicePixelRatio * currentSize);
        ctx.strokeStyle = "#ccc";
        for (let i = 0; i <= currentSize; i++) {
            ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, currentSize * cellSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(currentSize * cellSize, i * cellSize); ctx.stroke();
        }
        // ここにパズルの問題データを読み込んで描画するロジックが続きます
    }

    canvas.addEventListener('pointerup', (e) => {
        if (!isPlaying) return;
        // タップ判定のロジック
    });

    window.onload = init;
</script>
</body>
</html>
