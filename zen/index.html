<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禅・瞑想タイマー | Time Toolkit</title>
    <style>
        :root {
            --zen-deep: #6366f1;
            --zen-light: #f5f3ff;
            --text-main: #1e293b;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--zen-light);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100dvh; overflow: hidden;
        }

        /* 呼吸ビジュアルコンテナ */
        .breathe-container {
            position: relative;
            width: 300px; height: 300px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 呼吸する円（背景） */
        .breathe-circle {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--zen-deep);
            border-radius: 50%;
            opacity: 0.15;
            transform: scale(0.6);
            /* JSで動的にtransitionを設定 */
        }

        /* 座禅シルエット（SVG） */
        .zen-silhouette {
            position: absolute;
            width: 120px; /* シルエットのサイズ */
            height: 120px;
            fill: var(--zen-deep); /* 円と同じ色にする */
            opacity: 0.6; /* 少し透過させて馴染ませる */
            z-index: 5;
            pointer-events: none; /* クリックを阻害しない */
        }

        .timer-display {
            font-size: 3.5rem; font-weight: 100; z-index: 10;
            font-variant-numeric: tabular-nums;
            color: var(--text-main);
            text-shadow: 0 0 15px white; /* シルエットと重なっても見やすく */
        }

        .guide-text {
            position: absolute; bottom: -50px;
            font-size: 1.2rem; font-weight: 500;
            color: var(--zen-deep); letter-spacing: 0.1em;
            text-align: center; width: 100%;
        }

        /* コントロール UI */
        .controls {
            margin-top: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            transition: opacity 1s;
        }

        .rhythm-selector {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }

        button {
            background: white; border: 1px solid #e2e8f0;
            padding: 10px 18px; border-radius: 99px;
            cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
        }

        button.active {
            background: var(--zen-deep); color: white; border-color: var(--zen-deep);
        }

        .main-controls {
            display: flex; gap: 15px;
        }

        .start-btn {
            background: var(--zen-deep); color: white; border: none;
            padding: 15px 40px; font-size: 1.1rem; font-weight: bold;
            border-radius: 99px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .pause-btn {
            background: #f1f5f9; color: var(--text-main); border: none;
            padding: 15px 30px; font-size: 1.1rem; border-radius: 99px;
            display: none;
        }

        body.meditating .controls {
            /* 瞑想中はUIをほぼ透明に */
            opacity: 0.05;
        }
        body.meditating .controls:hover {
            /* マウスを乗せた時だけ見えるように（中断用） */
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="breathe-container">
    <div class="breathe-circle" id="circle"></div>
    
    <svg class="zen-silhouette" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8zm0 18c-7.7 0-14 6.3-14 14v2h28v-2c0-7.7-6.3-14-14-14zm-16 18c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6c0-.3 0-.6-.1-.9l7.2-3.6c1.1.9 2.5 1.5 4 1.5 1.4 0 2.7-.5 3.8-1.4l7.3 3.6c-.1.3-.1.6-.1.9 0 3.3 2.7 6 6 6s6-2.7 6-6-2.7-6-6-6-6 2.7-6 6c0 .3 0 .6.1.9l-7.3-3.6c-1.1.9-2.5 1.5-3.9 1.5-1.5 0-2.8-.5-3.9-1.5l-7.2 3.6c.1-.3.1-.6.1-.9 0-3.3-2.7-6-6-6z"/>
    </svg>

    <div class="timer-display" id="display">05:00</div>
    <div class="guide-text" id="guide">READY</div>
</div>

<div class="controls">
    <div class="rhythm-selector">
        <button onclick="setRhythm('zen')" id="btn-zen" class="active">禅 (5-5)</button>
        <button onclick="setRhythm('standard')" id="btn-standard">集中 (4-4-4)</button>
        <button onclick="setRhythm('relax')" id="btn-relax">休息 (4-7-8)</button>
    </div>
    <div class="time-presets">
        <button onclick="setDuration(180)">3分</button>
        <button onclick="setDuration(300)">5分</button>
        <button onclick="setDuration(600)">10分</button>
    </div>
    <div class="main-controls">
        <button class="start-btn" id="startBtn" onclick="toggleMeditation()">瞑想を開始</button>
        <button class="pause-btn" id="pauseBtn" onclick="togglePause()">一時停止</button>
    </div>
</div>

<script>
    // JSロジックは前回（一時停止対応版）と同じ
    const rhythms = {
        zen: { inhale: 5, hold1: 0, exhale: 5, label: "禅 (5-5)" },
        standard: { inhale: 4, hold1: 4, exhale: 4, label: "集中 (4-4-4)" },
        relax: { inhale: 4, hold1: 7, exhale: 8, label: "リラックス (4-7-8)" }
    };

    let currentRhythm = 'zen';
    let timeLeft = 300;
    let timerId = null;
    let isMeditating = false;
    let isPaused = false;

    // Web Audio APIの初期化を遅延させる（ブラウザ対策）
    let audioCtx = null;
    
    const circle = document.getElementById('circle');
    const guide = document.getElementById('guide');
    const display = document.getElementById('display');
    const pauseBtn = document.getElementById('pauseBtn');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function setRhythm(key) {
        if (isMeditating) return;
        currentRhythm = key;
        document.querySelectorAll('.rhythm-selector button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${key}`).classList.add('active');
    }

    function setDuration(sec) {
        if (isMeditating) return;
        timeLeft = sec;
        updateDisplay();
    }

    function updateDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function playBell() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 3);
    }

    async function runBreatheCycle() {
        while (isMeditating) {
            const r = rhythms[currentRhythm];

            // 1. 吸う
            if (!isMeditating) break;
            guide.textContent = "吸う";
            circle.style.transition = `all ${r.inhale}s ease-in-out`;
            circle.style.transform = "scale(1.1)";
            circle.style.opacity = "0.3"; // シルエットが見えるよう少し薄く
            await waitTime(r.inhale * 1000);

            // 2. 止める
            if (!isMeditating) break;
            if (r.hold1 > 0) {
                guide.textContent = "止める";
                await waitTime(r.hold1 * 1000);
            }

            // 3. 吐く
            if (!isMeditating) break;
            guide.textContent = "吐く";
            circle.style.transition = `all ${r.exhale}s ease-in-out`;
            circle.style.transform = "scale(0.6)";
            circle.style.opacity = "0.1";
            await waitTime(r.exhale * 1000);
        }
    }

    async function waitTime(ms) {
        let elapsed = 0;
        const interval = 10; // より滑らかな判定のため短く
        while (elapsed < ms && isMeditating) {
            if (!isPaused) {
                elapsed += interval;
            }
            await new Promise(r => setTimeout(r, interval));
        }
    }

    function toggleMeditation() {
        if (isMeditating) stop();
        else start();
    }

    function togglePause() {
        if (!isMeditating) return;
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? "再開" : "一時停止";
        guide.textContent = isPaused ? "中断中" : "再開します";
    }

    function start() {
        isMeditating = true;
        isPaused = false;
        document.body.classList.add('meditating');
        document.getElementById('startBtn').textContent = "終了";
        pauseBtn.style.display = "block";
        playBell();
        runBreatheCycle();
        timerId = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) stop(true);
            }
        }, 1000);
    }

    function stop(isFinished = false) {
        isMeditating = false;
        isPaused = false;
        clearInterval(timerId);
        document.body.classList.remove('meditating');
        document.getElementById('startBtn').textContent = "瞑想を開始";
        pauseBtn.style.display = "none";
        pauseBtn.textContent = "一時停止";
        guide.textContent = "READY";
        circle.style.transform = "scale(0.6)";
        circle.style.opacity = "0.15";
        if (isFinished) {
            playBell();
            setTimeout(() => alert("心が整いました。"), 300);
        }
    }
</script>
</body>
</html>
