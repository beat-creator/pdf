<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュアPDF変換 - ローカル完結型</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-size: 1.25rem; margin-bottom: 1rem; text-align: center; }
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .drop-zone:hover { border-color: var(--primary); background: #eff6ff; }
        #file-list { margin-top: 20px; list-style: none; padding: 0; }
        .file-item { display: flex; align-items: center; background: #f1f5f9; margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .controls { display: flex; gap: 4px; margin-left: 8px; }
        .btn-sm { border: none; background: #e2e8f0; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .btn-sm:hover { background: #cbd5e1; }
        .config { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        label { font-size: 0.85rem; font-weight: bold; color: #475569; }
        input, select { width: 100%; padding: 10px; margin: 8px 0 16px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .main-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .main-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        #status-msg { margin-top: 12px; text-align: center; font-weight: bold; min-height: 1.2rem; }
        .success { color: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 セキュアPDF変換</h1>
    <p style="font-size: 0.8rem; color: #64748b; text-align: center; margin-top: -10px;">ブラウザ内で完結。外部送信なし。</p>
    
    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
        画像をタップして追加
        <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
    </div>

    <ul id="file-list"></ul>

    <div class="config">
        <label>保存ファイル名</label>
        <input type="text" id="pdf-name" placeholder="ファイル名を入力">
