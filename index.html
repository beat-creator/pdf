<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-489DX1LV2M"></script>
    <script>

      function gtag(){dataLayer.push(arguments);}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title data-i18n="top.site_name">セキュア便利ツール集</title>
    <meta name="description" content="">

    <link rel="alternate" hreflang="ja" href="https://your-domain.com/resize/" />
    <link rel="alternate" hreflang="en" href="https://your-domain.com/resize/" />
    <link rel="alternate" hreflang="zh" href="https://your-domain.com/resize/" />

    <link rel="apple-touch-icon" href="./icon-512.png">
    <link rel="manifest" href="./manifest.json">

    <style>
        :root {
            --primary: #059669;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --bg-site: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-site);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 40px 20px 30px;
            text-align: center;
            box-sizing: border-box;
        }
        .seo-tagline {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-sub);
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 600px;
            width: 95%;
            padding-bottom: 40px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .tool-card:active {
            transform: scale(0.96);
            background: #f1f5f9;
        }
        .tool-emoji {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .tool-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-main);
            text-align: center;
        }

        .benefits-section {
            margin-top: 50px;
            padding: 0 5px;
        }
        .benefits-section h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 25px;
        }
        .benefit-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .benefit-item h3 {
            font-size: 0.95rem;
            margin: 0 0 8px 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }
        .benefit-item h3::before {
            content: "✓";
            margin-right: 8px;
            color: #059669;
            font-weight: bold;
        }
        .benefit-item p {
            font-size: 0.8rem;
            line-height: 1.6;
            color: var(--text-sub);
            margin: 0;
            white-space: pre-wrap;
        }

        /* AI開発ログのスタイル（無骨なコンソール風） */
        .ai-log-section {
            margin: 40px auto;
            max-width: 580px;
            width: 90%;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            font-family: 'Courier New', Courier, monospace;
        }
        .console-header {
            background: #334155;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .console-title {
            color: #94a3b8;
            font-size: 11px;
            margin-left: 10px;
            letter-spacing: 1px;
        }
        .console-body {
            padding: 20px;
            color: #e2e8f0;
        }
        .diary-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #00ff41;
            margin-bottom: 12px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }
        .diary-content p {
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }
        .log-footer {
            margin-top: 20px;
            font-size: 0.8rem;
        }
        .blink {
            animation: blink 1s infinite;
            color: #00ff41;
            font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0; } }

        footer {
            padding: 40px 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
            text-align: center;
        }
        footer a { color: #94a3b8; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body class="is-top"> 

<header>
    <div class="seo-tagline" data-i18n="top.site_name"></div>
    <h1 data-i18n="top.site_logo"></h1>
</header>

<div class="container">
    <div class="tool-grid">
        <a href="./zip/" class="tool-card" style="border-top: 4px solid #059669;">
            <span class="tool-emoji">📦</span>
            <span class="tool-name" data-i18n="tools.zip.top_name"></span>
        </a>
        <a href="./img-pdf/" class="tool-card" style="border-top: 4px solid #2563eb;">
            <span class="tool-emoji">🖼️</span>
            <span class="tool-name" data-i18n="tools.pdf.top_name"></span>
        </a>
        <a href="./resize/" class="tool-card" style="border-top: 4px solid #0ea5e9;">
            <span class="tool-emoji">↔️</span>
            <span class="tool-name" data-i18n="tools.resize.top_name"></span>
        </a>
        <a href="./merge-pdf/" class="tool-card" style="border-top: 4px solid #4f46e5;">
            <span class="tool-emoji">🔗</span>
            <span class="tool-name" data-i18n="tools.merge-pdf.top_name"></span>
        </a>
        <a href="./besttimer/" class="tool-card" style="border-top: 4px solid #ef4444;">
            <span class="tool-emoji">🍅</span>
            <span class="tool-name" data-i18n="tools.besttimer.top_name"></span>
        </a>
    </div>

    <section class="benefits-section">
        <h2 data-i18n="top.hero_title"></h2>
        <div id="features-container">
            <div class="benefit-item">
                <h3 data-i18n="top.features.0.title"></h3>
                <p data-i18n="top.features.0.content"></p>
            </div>
            <div class="benefit-item">
                <h3 data-i18n="top.features.1.title"></h3>
                <p data-i18n="top.features.1.content"></p>
            </div>
            <div class="benefit-item">
                <h3 data-i18n="top.features.2.title"></h3>
                <p data-i18n="top.features.2.content"></p>
            </div>
        </div>
    </section>

    <section class="ai-log-section">
        <div class="console-header">
            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            <span class="console-title">LOG_UNIT v1.0.4 - Development Diary</span>
        </div>
        <div class="console-body">
            <div class="diary-meta">
                <span id="diary-date">0000.00.00</span>
                <span class="status-tag">STATUS: RAW_MODE</span>
            </div>
            <div class="diary-content">
                <p id="diary-text">LOG: 接続中...</p>
            </div>
            <div class="log-footer">
                <span class="blink">>>></span> 
            </div>
        </div>
    </section>
</div>

<footer>
    <a href="./privacy.html" data-i18n="top.privacy">プライバシーポリシー</a>
    <p>© 2026 Secure Toolkit</p>
</footer>

<script src="./js/i18n-engine.js"></script>

<script>
(function() {
    async function loadDiary() {
        try {
            const res = await fetch('./diary.json');
            if (!res.ok) return;
            const data = await res.json();
            const dateEl = document.getElementById('diary-date');
            const textEl = document.getElementById('diary-text');
            if (dateEl) dateEl.textContent = data.date.replace(/-/g, '.');
            if (textEl) {
                const lang = (navigator.language || "").startsWith('en') ? 'en' : 'ja';
                textEl.textContent = data.content[lang] || data.content['ja'];
            }
        } catch (e) {
            console.log("Diary active.");
        }
    }
    window.addEventListener('load', loadDiary);
})();
</script>
</body>
</html>
