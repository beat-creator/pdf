<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Toolkit | サーバー送信なしの安心ツール集</title>
    <style>
        :root { 
            --primary: #059669; 
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text: #1e293b; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header {
            width: 100%;
            background: var(--card-bg);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .container { 
            max-width: 600px; 
            width: 90%; 
            margin: 40px 0; 
        }

        /* ツールカードのスタイル */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .tool-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .tool-icon {
            width: 64px;
            height: 64px;
            background: #f0fdf4;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-right: 20px;
        }

        .tool-info h2 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--primary);
        }
        .tool-info p {
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            color: #64748b;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 1.5rem;">Secure Toolkit</h1>
        <p style="margin:10px 0 0 0; color:#64748b;">🛡️ セキュア便利ツール集</p>
    </header>

    <div class="container">
        <div class="tool-grid">
            
            <a href="./zip/" class="tool-card">
                <div class="tool-icon">📦</div>
                <div class="tool-info">
                    <h2>セキュア圧縮ツール</h2>
                    <p>複数のファイルをブラウザ内で安全にZIP圧縮します。</p>
                </div>
            </a>

            <a href="./pdf/" class="tool-card">
                <div class="tool-icon">📄</div>
                <div class="tool-info">
                    <h2>セキュア画像PDF変換</h2>
                    <p>写真をサーバーに送らず、ブラウザでPDFに変換します。</p>
                </div>
            </a>

        </div>
    </div>

    <footer>
        &copy; 2026 Secure Toolkit. All files are processed locally.
    </footer>

</body>
</html>
