<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュア便利ツール集 | スマホ・PC両対応</title>
    <style>
        :root { --primary: #2563eb; --text: #1e293b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; color: var(--text); max-width: 600px; margin: 0 auto; padding: 20px; background: #f8fafc; }
        .card { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* ヘッダーをスリム化 */
        header { text-align: center; margin-bottom: 24px; }
        h1 { font-size: 1.4rem; color: var(--primary); margin: 0 0 8px 0; }
        .badge-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .badge { font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; background: #eff6ff; color: var(--primary); border: 1px solid #dbeafe; }
        
        /* メイン説明をコンパクトに */
        .hero-text { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }

        .tool-link { display: flex; align-items: center; padding: 20px; background: #fff; border: 2px solid #e2e8f0; border-radius: 16px; text-decoration: none; transition: 0.2s; }
        .tool-link:hover { border-color: var(--primary); background: #f0f7ff; transform: translateY(-2px); }
        .tool-icon { font-size: 2rem; margin-right: 16px; }
        .tool-info { flex: 1; }
        .tool-title { display: block; color: #0f172a; font-weight: bold; font-size: 1rem; margin-bottom: 4px; }
        .tool-desc { display: block; color: #64748b; font-size: 0.75rem; }

        .trust-box { background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 24px; font-size: 0.8rem; }
        .trust-box strong { color: #60a5fa; display: block; margin-bottom: 4px; }

        .footer { margin-top: 30px; font-size: 0.7rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1>🛠️ セキュア便利ツール集</h1>
            <div class="badge-container">
                <span class="badge">スマホ・PC両対応</span>
                <span class="badge">完全無料</span>
                <span class="badge">登録不要</span>
            </div>
            <p class="hero-text">ブラウザで動く、インストール不要のアプリ集。<br>1枚から複数結合まで、手軽に安全に処理できます。</p>
        </header>

        <a href="./img-pdf/" class="tool-link">
            <span class="tool-icon">🖼️</span>
            <div class="tool-info">
                <span class="tool-title">画像PDF変換・結合</span>
                <span class="tool-desc">1枚の変換も、複数枚の結合もこれひとつで。スマホカメラからの直接取り込みも対応。</span>
            </div>
        </a>

        <div class="trust-box">
            <strong>🛡️ 100% 端末内処理（プライバシー重視）</strong>
            サーバーへデータを送りません。読み込み後は【オフライン（機内モード）】でも動作するため、機密書類も安心して扱えます。
        </div>

        <div class="footer">
            <p>© 2026 セキュア便利ツール集 | プライバシー保護型</p>
        </div>
    </div>
</body>
</html>
