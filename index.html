<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N-Back Pro Custom | Secure Toolkit</title>
    <style>
        :root {
            --bg: #020617; --text: #f8fafc; --accent: #3b82f6;
            --success: #10b981; --danger: #ef4444; --card: #1e293b;
        }
        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        .timer-bar-container { width: 100%; height: 4px; background: #1e293b; position: absolute; top: 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        .display { font-size: 4.5rem; font-weight: 900; margin: 10px 0; min-height: 1.2em; color: var(--accent); }
        .stats { font-size: 0.9rem; color: #64748b; margin-bottom: 5px; letter-spacing: 0.1em; }
        .current-n { font-size: 1.2rem; font-weight: bold; color: #f59e0b; margin-bottom: 20px; }

        .num-pad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            width: 90vw; max-width: 340px;
        }
        .btn {
            background: var(--card); border: 1px solid #334155; border-radius: 12px;
            color: var(--text); font-size: 1.8rem; padding: 18px 0; cursor: pointer;
        }
        .btn:active { background: var(--accent); transform: scale(0.95); }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
        .start-btn {
            padding: 18px 60px; font-size: 1.2rem; background: var(--accent);
            color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        }
        .hidden { display: none; }
        .correct-text { color: var(--success); }
        .wrong-text { color: var(--danger); }
    </style>
</head>
<body>

    <div class="timer-bar-container"><div id="timer-bar"></div></div>

    <div id="game-ui">
        <div class="stats" id="stats-line">PREPARING...</div>
        <div class="current-n" id="n-status">LEVEL 1: 2-Back Normal</div>
        <div class="display" id="display">READY</div>
        <div class="num-pad">
            <button class="btn" onclick="input(1)">1</button><button class="btn" onclick="input(2)">2</button><button class="btn" onclick="input(3)">3</button>
            <button class="btn" onclick="input(4)">4</button><button class="btn" onclick="input(5)">5</button><button class="btn" onclick="input(6)">6</button>
            <button class="btn" onclick="input(7)">7</button><button class="btn" onclick="input(8)">8</button><button class="btn" onclick="input(9)">9</button>
            <div></div><button class="btn" onclick="input(0)">0</button>
        </div>
    </div>

    <div id="overlay" class="screen">
        <div id="result-area" class="hidden" style="text-align: center;">
            <div id="result-title" style="font-size: 2rem; margin-bottom: 10px;"></div>
            <div id="result-detail" style="margin-bottom: 30px; color: #94a3b8;"></div>
        </div>
        <button class="start-btn" id="main-btn" onclick="initGame()">START TRAINING</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(f, d, type='sine') {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.value = f;
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        let n = 2; 
        let isHighSpeed = false;
        let questions = [];
        let hitCount = 0;
        let qIndex = 0;
        let isWaiting = false;
        let timerInterval;

        const el = {
            display: document.getElementById('display'),
            nStatus: document.getElementById('n-status'),
            statsLine: document.getElementById('stats-line'),
            bar: document.getElementById('timer-bar'),
            overlay: document.getElementById('overlay'),
            resArea: document.getElementById('result-area'),
            resTitle: document.getElementById('result-title'),
            resDetail: document.getElementById('result-detail'),
            mainBtn: document.getElementById('main-btn')
        };

        function initGame() {
            el.overlay.classList.add('hidden');
            questions = [];
            hitCount = 0;
            qIndex = 0;
            updateStatusText();
            nextStep();
        }

        function updateStatusText() {
            el.nStatus.innerText = `${n}-Back (${isHighSpeed ? "HIGH SPEED" : "NORMAL SPEED"})`;
        }

        async function nextStep() {
            if (qIndex >= 20) { endGame(); return; }

            isWaiting = true;
            el.display.classList.remove('correct-text', 'wrong-text');
            el.bar.style.width = "100%";

            // 出題生成（足し算と引き算をランダムに）
            let formula = "";
            let ans = 0;
            if (Math.random() > 0.5) {
                const a = Math.floor(Math.random() * 6) + 1;
                const b = Math.floor(Math.random() * 3) + 1;
                formula = `${a}+${b}=`;
                ans = a + b;
            } else {
                const a = Math.floor(Math.random() * 6) + 4;
                const b = Math.floor(Math.random() * 4) + 1;
                formula = `${a}-${b}=`;
                ans = a - b;
            }
            questions.push(ans);
            el.display.innerText = formula;
            playTone(440, 0.1);

            // パパさん向けに緩和したインターバル時間
            const intervalTime = isHighSpeed ? 2500 : 4000;
            
            if (questions.length <= n) {
                el.statsLine.innerText = `MEMORIZING... (${questions.length}/${n})`;
                setTimeout(nextStep, intervalTime);
            } else {
                el.statsLine.innerText = `QUESTION ${qIndex + 1} / 20`;
                isWaiting = false;
                startTimer(intervalTime - 300); 
            }
        }

        function startTimer(ms) {
            let start = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let pct = 100 - ((Date.now() - start) / ms * 100);
                el.bar.style.width = pct + "%";
                if (pct <= 0) { clearInterval(timerInterval); input(-1); }
            }, 50);
        }

        function input(val) {
            if (isWaiting) return;
            isWaiting = true;
            clearInterval(timerInterval);

            if (val === questions[qIndex]) {
                hitCount++;
                el.display.innerText = "OK";
                el.display.classList.add('correct-text');
                playTone(880, 0.1);
            } else {
                el.display.innerText = val === -1 ? "TIME UP" : "MISS";
                el.display.classList.add('wrong-text');
                playTone(220, 0.3, 'sawtooth');
            }

            qIndex++;
            setTimeout(nextStep, 600);
        }

        function endGame() {
            el.overlay.classList.remove('hidden');
            el.resArea.classList.remove('hidden');
            const scorePct = Math.floor((hitCount / 20) * 100);
            const isPassed = scorePct >= 80;

            if (isPassed) {
                el.resTitle.innerText = "PASSED!";
                el.resTitle.className = "correct-text";
                if (!isHighSpeed) isHighSpeed = true; else { n++; isHighSpeed = false; }
                el.resDetail.innerHTML = `Score: ${scorePct}%<br>Level Up!`;
                el.mainBtn.innerText = "NEXT LEVEL";
            } else {
                el.resTitle.innerText = "FAILED";
                el.resTitle.className = "wrong-text";
                el.resDetail.innerHTML = `Score: ${scorePct}%<br>Try Level ${n} Again.`;
                el.mainBtn.innerText = "RETRY";
            }
        }
    </script>
</body>
</html>
