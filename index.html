    <style>
        :root {
            --primary: #059669;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --bg-site: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-site);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 40px 20px 30px;
            text-align: center;
            box-sizing: border-box;
        }
        .seo-tagline {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-sub);
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 600px;
            width: 95%;
            padding-bottom: 40px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .tool-card:active {
            transform: scale(0.96);
            background: #f1f5f9;
        }
        .tool-emoji {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .tool-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-main);
            text-align: center;
        }

        .benefits-section {
            margin-top: 50px;
            padding: 0 5px;
        }
        .benefits-section h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 25px;
        }
        .benefit-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .benefit-item h3 {
            font-size: 0.95rem;
            margin: 0 0 8px 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }
        .benefit-item h3::before {
            content: "✓";
            margin-right: 8px;
            color: #059669;
            font-weight: bold;
        }
        .benefit-item p {
            font-size: 0.8rem;
            line-height: 1.6;
            color: var(--text-sub);
            margin: 0;
            white-space: pre-wrap;
        }

        footer {
            padding: 40px 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
            text-align: center;
        }
        footer a { color: #94a3b8; text-decoration: none; margin: 0 10px; }
    </style>
</head>

            <span class="tool-emoji">🔗</span>

        </a>
        <a href="./besttimer/" class="tool-card" style="border-top: 4px solid #ef4444;">
            <span class="tool-emoji">🍅</span>

    <section class="benefits-section">

            </div>
        </div>
    </section>
</div>

<footer>
