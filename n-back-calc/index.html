<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N-Back Pro | Secure Toolkit</title>
    <style>
        :root {
            --bg: #020617; --text: #f8fafc; --accent: #3b82f6;
            --card: #1e293b; --success: #10b981; --danger: #ef4444;
        }
        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        .timer-bar-container { width: 100%; height: 4px; background: #1e293b; position: absolute; top: 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        .problem-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; gap: 30px; }
        
        /* 上段：最新題 */
        .upper-box { text-align: center; }
        .label-sm { font-size: 0.75rem; color: #64748b; letter-spacing: 0.1em; margin-bottom: 5px; }
        .formula-main { font-size: 3.8rem; font-weight: 900; color: var(--accent); }

        /* 下段：回答題（マスキング） */
        .lower-box { 
            text-align: center; padding: 25px; background: rgba(30, 41, 59, 0.5); 
            border-radius: 16px; width: 85%; max-width: 320px; border: 1px solid #334155;
        }
        .formula-sub { font-size: 2rem; font-weight: bold; color: #94a3b8; }
        .ans-target { font-size: 2.5rem; color: #f59e0b; margin-left: 10px; }

        .num-pad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            width: 90vw; max-width: 340px; margin-bottom: 20px;
        }
        .btn {
            background: var(--card); border: 1px solid #334155; border-radius: 12px;
            color: var(--text); font-size: 1.8rem; padding: 18px 0; cursor: pointer;
        }
        .btn:active { background: var(--accent); }

        /* スクリーン */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 200; text-align: center; }
        .start-btn { padding: 16px 50px; font-size: 1.2rem; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .reset-btn { background: none; border: 1px solid #475569; color: #64748b; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="timer-bar-container"><div id="timer-bar"></div></div>

    <div id="start-screen" class="screen">
        <h1 style="margin-bottom: 10px;">N-Back Calculation</h1>
        <div id="level-status" style="font-size: 1.2rem; color: #f59e0b; margin-bottom: 5px;">LEVEL 1</div>
        <p id="level-desc" style="color: #64748b; margin-bottom: 30px;">2-Back Normal</p>
        <button class="start-btn" onclick="initGame()">TRAINING START</button><br>
        <button class="reset-btn" onclick="resetAll()">RESET TO LEVEL 1</button>
    </div>

    <div class="problem-container">
        <div class="upper-box">
            <div class="label-sm" id="progress-text">QUESTION 1 / 20</div>
            <div class="formula-main" id="formula-mem">?+?=</div>
        </div>

        <div class="lower-box">
            <div class="label-sm">ANSWER N-BACK</div>
            <div class="formula-sub">
                <span id="formula-ans">???=</span>
                <span id="ans-result" class="ans-target">?</span>
            </div>
        </div>
    </div>

    <div class="num-pad">
        <button class="btn" onclick="handleInput(1)">1</button><button class="btn" onclick="handleInput(2)">2</button><button class="btn" onclick="handleInput(3)">3</button>
        <button class="btn" onclick="handleInput(4)">4</button><button class="btn" onclick="handleInput(5)">5</button><button class="btn" onclick="handleInput(6)">6</button>
        <button class="btn" onclick="handleInput(7)">7</button><button class="btn" onclick="handleInput(8)">8</button><button class="btn" onclick="handleInput(9)">9</button>
        <div></div><button class="btn" onclick="handleInput(0)">0</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d, type='sine') {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.value = f; g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        let n = 2; let isHighSpeed = false; let questions = []; let hitCount = 0; let qIndex = 0; let isWaiting = false; let timerInterval;

        const el = {
            formulaMem: document.getElementById('formula-mem'),
            formulaAns: document.getElementById('formula-ans'),
            ansResult: document.getElementById('ans-result'),
            progress: document.getElementById('progress-text'),
            bar: document.getElementById('timer-bar'),
            startScreen: document.getElementById('start-screen'),
            levelStatus: document.getElementById('level-status'),
            levelDesc: document.getElementById('level-desc')
        };

        function resetAll() { n = 2; isHighSpeed = false; updateMenu(); }

        function updateMenu() {
            el.levelStatus.innerText = `LEVEL ${isHighSpeed ? (n-1)*2 : (n-1)*2-1}`;
            el.levelDesc.innerText = `${n}-Back ${isHighSpeed?'(High Speed)':'(Normal Speed)'}`;
        }

        function initGame() { el.startScreen.classList.add('hidden'); questions = []; hitCount = 0; qIndex = 0; nextStep(); }

        async function nextStep() {
            if (qIndex >= 20) { endGame(); return; }
            isWaiting = true; el.bar.style.width = "100%";
            el.ansResult.innerText = "?"; el.ansResult.style.color = "#f59e0b";
            el.formulaAns.innerText = "???=";

            let a = Math.floor(Math.random() * 5) + 1; let b = Math.floor(Math.random() * 4) + 1;
            let formula, ans;
            if (Math.random() > 0.5) { formula = `${a}+${b}=`; ans = a+b; }
            else { formula = `${a+b}-${a}=`; ans = b; }

            questions.push({ formula, ans });
            el.formulaMem.innerText = formula;
            el.progress.innerText = `QUESTION ${questions.length} / ${20 + n}`;
            beep(440, 0.1);

            const interval = isHighSpeed ? 2500 : 4000;
            if (questions.length <= n) {
                setTimeout(nextStep, interval);
            } else {
                isWaiting = false; startTimer(interval - 300);
            }
        }

        function startTimer(ms) {
            let start = Date.now(); clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let pct = 100 - ((Date.now() - start) / ms * 100);
                el.bar.style.width = pct + "%";
                if (pct <= 0) { clearInterval(timerInterval); handleInput(-1); }
            }, 50);
        }

        function handleInput(val) {
            if (isWaiting) return; isWaiting = true; clearInterval(timerInterval);
            const target = questions[qIndex].ans;
            const isCorrect = (val === target);
            
            // 入力後にマスク解除
            el.formulaAns.innerText = questions[qIndex].formula;
            el.ansResult.innerText = target;
            el.ansResult.style.color = isCorrect ? 'var(--success)' : 'var(--danger)';
            
            if (isCorrect) { hitCount++; beep(880, 0.1); } else { beep(220, 0.3, 'sawtooth'); }

            setTimeout(() => { qIndex++; nextStep(); }, 800);
        }

        function endGame() {
            const score = Math.floor((hitCount / 20) * 100);
            if (score >= 80) {
                if (!isHighSpeed) isHighSpeed = true; else { n++; isHighSpeed = false; }
                beep(1000, 0.5);
            } else if (score < 60) {
                // 降格ルール
                if (isHighSpeed) isHighSpeed = false;
                else if (n > 2) { n--; isHighSpeed = true; }
                beep(150, 0.5, 'sawtooth');
            }
            updateMenu();
            el.levelDesc.innerText += `\nLast Score: ${score}%`;
            el.startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
