<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュア画像リサイズ | Secure Toolkit</title>
    <style>
        :root { --primary: #059669; --primary-hover: #047857; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .app-header { width: 100%; background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .back-btn { display: flex; align-items: center; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 600; background: #f1f5f9; padding: 6px 12px; border-radius: 20px; }

        .container { max-width: 500px; width: 95%; background: var(--card-bg); margin: 20px 0; padding: 24px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); box-sizing: border-box; }
        .info-box { background: #ecfdf5; border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 0.8rem; line-height: 1.5; color: var(--primary-hover); display: flex; align-items: flex-start; }
        
        .drop-zone { border: 2px dashed var(--primary); border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; background: #fff; color: var(--primary); font-weight: bold; }
        
        #file-list { margin: 20px 0; padding: 0; }
        .file-item { display: flex; align-items: center; background: #f8fafc; margin-bottom: 10px; padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-right: 12px; background: #e2e8f0; }
        .file-info { flex: 1; min-width: 0; font-size: 0.85rem; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        
        .config-card { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 6px; display: block; }
        select, input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; margin-bottom: 12px; }
        
        .main-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .main-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        #status-msg { margin-top: 15px; text-align: center; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="../" class="back-btn">🏠 ツール一覧</a>
        <div style="flex:1; text-align:center; font-weight:bold; margin-right:60px;">セキュア画像リサイズ</div>
    </header>

    <div class="container">
        <h1 style="font-size: 1.3rem; margin-bottom: 20px; text-align:center;">🖼️ 画像をリサイズする</h1>
        
        <div class="info-box">
            <span>🔒</span>
            <div style="margin-left:8px;"><strong>プライバシー保護:</strong> 画像データは一切サーバーに送信されません。ブラウザ内で安全に縮小されます。</div>
        </div>
        
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            ➕ 画像を選択・ドロップ
            <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
        </div>

        <div id="file-list"></div>

        <div class="config-card" id="config-area" style="display:none;">
            <label>リサイズ設定（横幅）</label>
            <select id="size-preset">
                <option value="1920">フルHD (横1920px)</option>
                <option value="1280" selected>標準 (横1280px)</option>
                <option value="800">小さめ (横800px)</option>
                <option value="custom">カスタム指定</option>
            </select>
            <input type="number" id="custom-width" placeholder="横幅(px)を入力" style="display:none;">
            
            <label>保存形式</label>
            <select id="file-format">
                <option value="image/jpeg">JPEG (軽量)</option>
                <option value="image/png">PNG (高品質)</option>
            </select>
        </div>

        <button id="exec-btn" class="main-btn" onclick="processImages()" disabled>リサイズして保存</button>
        <div id="status-msg"></div>
    </div>

    <script>
        let filesArray = [];
        const sizePreset = document.getElementById('size-preset');
        const customWidth = document.getElementById('custom-width');

        sizePreset.onchange = () => {
            customWidth.style.display = sizePreset.value === 'custom' ? 'block' : 'none';
        };

        function handleFiles(files) {
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    filesArray.push({ file, src: e.target.result });
                    updateList();
                };
                reader.readAsDataURL(file);
            }
        }

        function updateList() {
            const list = document.getElementById('file-list');
            const config = document.getElementById('config-area');
            const btn = document.getElementById('exec-btn');
            list.innerHTML = '';
            filesArray.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<img src="${item.src}" class="thumb"><div class="file-info"><span class="file-name">${item.file.name}</span></div><button style="border:none;background:none;color:#ef4444;cursor:pointer;" onclick="removeFile(${index})">✕</button>`;
                list.appendChild(div);
            });
            const hasFiles = filesArray.length > 0;
            config.style.display = hasFiles ? 'block' : 'none';
            btn.disabled = !hasFiles;
        }

        function removeFile(index) {
            filesArray.splice(index, 1);
            updateList();
        }

        async function processImages() {
            const btn = document.getElementById('exec-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true;
            status.innerText = "⏳ 処理中...";

            const targetWidth = sizePreset.value === 'custom' ? parseInt(customWidth.value) : parseInt(sizePreset.value);
            const format = document.getElementById('file-format').value;

            for (let item of filesArray) {
                const img = new Image();
                img.src = item.src;
                await img.decode();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const scale = targetWidth / img.width;
                canvas.width = targetWidth;
                canvas.height = img.height * scale;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const blob = await new Promise(res => canvas.toBlob(res, format, 0.85));
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `resized_${item.file.name.split('.')[0]}${format === 'image/jpeg' ? '.jpg' : '.png'}`;
                link.click();
            }

            status.innerText = "✅ 完了しました！";
            btn.disabled = false;
        }
    </script>
</body>
</html>
