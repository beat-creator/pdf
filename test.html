<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロジカル・リセット</title>
    <style>
        body {
            margin: 0;
            background-color: #8dd3cf; /* スクショのような爽やかな水色 */
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        /* バージョン表記（左上） */
        .version {
            position: absolute;
            top: -40px;
            left: 20px;
            color: #555;
            font-size: 14px;
        }

        /* タイトル文字のタイルデザイン */
        .title-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .tile {
            background-color: #fff;
            border: 4px solid #333;
            border-radius: 12px;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        /* ボタンのデザイン */
        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .btn-start { background-color: #59b183; } /* 緑 */
        .btn-other { background-color: #4c78a8; } /* 青 */

        /* 下の白いふわふわ（雲） */
        .clouds {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 100px;
            background: #fff;
            border-radius: 100% 100% 0 0;
            filter: blur(2px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="version">Ver. 1.0.0</div>
    
    <div class="title-row">
        <div class="tile">ロ</div>
        <div class="tile">ジ</div>
        <div class="tile">ッ</div>
        <div class="tile">ク</div>
    </div>
    <div class="title-row">
        <div class="tile">パ</div>
        <div class="tile">ズ</div>
        <div class="tile">ル</div>
    </div>

    <a href="#" class="btn btn-start">スタート</a>
    <a href="#" class="btn btn-other">問題一覧</a>
    <a href="#" class="btn btn-other" style="font-size: 18px;">セーブデータ</a>

    <div class="clouds"></div>
</div>

</body>
</html>
