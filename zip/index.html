<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-489DX1LV2M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-489DX1LV2M');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title id="page-title">Loading...</title>
    <meta name="description" id="meta-desc" content="">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { 
            --primary: #059669; 
            --primary-hover: #047857; 
            --bg: #ecfdf5; 
            --card-bg: #ffffff;
            --text: #1e293b; 
            --border: #e2e8f0;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-header { width: 100%; background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .back-btn { text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 600; background: #f1f5f9; padding: 8px 16px; border-radius: 20px; }

        .container { max-width: 500px; width: 95%; background: var(--card-bg); margin: 20px 0; padding: 24px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); box-sizing: border-box; }
        .info-box { background: var(--bg); border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 0.8rem; line-height: 1.5; color: var(--primary-hover); display: flex; align-items: flex-start; }
        .drop-zone { border: 2px dashed var(--primary); border-radius: 16px; padding: 35px 20px; text-align: center; cursor: pointer; background: #fff; color: var(--primary); font-weight: bold; }
        
        #file-list { margin: 20px 0; padding: 0; list-style: none; width: 100%; }
        .file-item { display: flex; align-items: center; background: #f8fafc; margin-bottom: 10px; padding: 10px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.85rem; }
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .config-card { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; margin-bottom: 12px; background: #fff; }
        
        .main-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .main-btn:disabled { background: #cbd5e1; }

        .tool-info { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); text-align: left; }
        .tool-info h2 { font-size: 1rem; color: var(--text); margin-bottom: 10px; }
        .tool-info p { font-size: 0.8rem; line-height: 1.6; color: #64748b; margin-bottom: 15px; white-space: pre-wrap; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .nav-item { text-decoration: none; padding: 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; font-size: 0.7rem; color: var(--text); text-align: center; }
    </style>
</head>
<body data-tool-key="zip">

    <header class="app-header">
        <a href="../" class="back-btn" id="nav-home"></a>
        <div style="flex:1; text-align:center; font-weight:bold; margin-right:80px;" id="header-title"></div>
    </header>

    <div class="container">
        <h1 style="font-size: 1.3rem; margin-bottom: 20px; text-align:center;" id="main-h1"></h1>
        
        <div class="info-box">
            <span>🛡️</span>
            <div style="margin-left:8px;" id="safe-msg"></div>
        </div>
        
        <div class="drop-zone" onclick="document.getElementById('file-input').click()" id="drop-area">
            <span id="drop-text"></span>
            <input type="file" id="file-input" multiple style="display:none" onchange="handleFiles(this.files)">
        </div>

        <ul id="file-list"></ul>

        <div class="config-card">
            <label id="label-name"></label>
            <input type="text" id="zip-name">
            
            <label id="label-comp"></label>
            <select id="comp-level">
                <option value="1" id="opt-low"></option>
                <option value="6" id="opt-mid" selected></option>
                <option value="9" id="opt-high"></option>
            </select>
        </div>

        <button id="process-btn" class="main-btn" onclick="generateZip()" disabled></button>
        <div id="status-msg" style="margin-top:15px; text-align:center; font-weight:bold;"></div>

        <div class="tool-info">
            <h2 id="footer-h2"></h2>
            <p id="footer-desc"></p>
            <p style="font-size:0.75rem; color:#64748b; margin-bottom:10px; text-align:center;" id="recommend-text"></p>
            <div class="nav-grid">
                <a href="../resize/" class="nav-item">↔️ Resize</a>
                <a href="../img-pdf/" class="nav-item">🖼️ PDF</a>
                <a href="../" class="nav-item" id="nav-back">🏠 Home</a>
            </div>
        </div>
    </div>

    <footer style="padding:20px; font-size:0.7rem; color:#94a3b8; text-align:center;">
        &copy; 2026 Secure Toolkit
    </footer>

<script>
    let filesArray = [];
    let currentLang = 'ja';
    let t = {}; // 翻訳データ
    let labels = {}; // 共通ラベル

    async function initI18n() {
        try {
            const response = await fetch('../assets/i18n-tools.json');
            const i18nData = await response.json();
            
            const lang = (navigator.language || navigator.userLanguage).split('-')[0];
            currentLang = ['ja', 'en', 'zh'].includes(lang) ? lang : 'en';
            
            // JSONからZIP用のデータを抽出
            t = i18nData["zip"];
            
            // 共通ラベル（もしJSONに共通セクションがあればそこから、なければフォールバック）
            const common = {
                ja: { home: "🏠 ツール一覧", back: "🏠 ホーム", recommend: "こちらのツールもおすすめ", processing: "⏳ 圧縮中...", done: "✅ 完了しました！", error: "❌ エラーが発生しました。" },
                en: { home: "🏠 All Tools", back: "🏠 Home", recommend: "Recommended Tools", processing: "⏳ Compressing...", done: "✅ Done!", error: "❌ Error occurred." },
                zh: { home: "🏠 工具列表", back: "🏠 首页", recommend: "推荐工具", processing: "⏳ 压缩中...", done: "✅ 完成！", error: "❌ 发生错误。" }
            }[currentLang];
            labels = common;

            // UI反映（JSONデータを優先的に使用）
            document.title = t.seo_title[currentLang];
            document.getElementById('meta-desc').content = t.meta_description[currentLang];
            document.getElementById('nav-home').innerText = labels.home;
            document.getElementById('nav-back').innerText = labels.back;
            document.getElementById('header-title').innerText = t.top_name[currentLang];
            document.getElementById('main-h1').innerText = t.emoji + " " + t.name[currentLang];
            
            // ZIP固有のラベル流し込み
            const z = t.labels ? t.labels[currentLang] : {};
            document.getElementById('safe-msg').innerHTML = z.safe || "<strong>ブラウザ内処理:</strong> サーバーへの送信なし。";
            document.getElementById('drop-text').innerText = z.drop || "➕ ファイルを選択";
            document.getElementById('label-name').innerText = z.label_name || "保存ファイル名";
            document.getElementById('label-comp').innerText = z.label_comp || "圧縮レベル";
            document.getElementById('opt-low').innerText = z.opt_low || "低";
            document.getElementById('opt-mid').innerText = z.opt_mid || "標準";
            document.getElementById('opt-high').innerText = z.opt_high || "高";
            document.getElementById('process-btn').innerText = z.btn || "ZIPを作成";
            
            document.getElementById('footer-h2').innerText = t.footer_desc[currentLang].split('\n')[0];
            document.getElementById('footer-desc').innerText = t.footer_desc[currentLang].split('\n')[1];
            document.getElementById('recommend-text').innerText = labels.recommend;

            // ファイル名初期値
            const n = new Date();
            const ts = n.toISOString().slice(0,10).replace(/-/g,'');
            document.getElementById('zip-name').value = `archive_${ts}`;

        } catch (err) {
            console.error("i18n Load Error:", err);
        }
    }

    function handleFiles(files) {
        filesArray = [...filesArray, ...Array.from(files)];
        updateList();
    }

    function updateList() {
        const list = document.getElementById('file-list');
        const btn = document.getElementById('process-btn');
        list.innerHTML = '';
        filesArray.forEach((file, index) => {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `<span class="file-name">${file.name}</span><button style="color:#ef4444;border:none;background:none;margin-left:auto;cursor:pointer;" onclick="removeItem(${index})">✕</button>`;
            list.appendChild(li);
        });
        btn.disabled = filesArray.length === 0;
    }

    function removeItem(index) {
        filesArray.splice(index, 1);
        updateList();
    }

    async function generateZip() {
        const btn = document.getElementById('process-btn');
        const status = document.getElementById('status-msg');
        const level = parseInt(document.getElementById('comp-level').value);
        const zipName = document.getElementById('zip-name').value || "archive";
        
        btn.disabled = true;
        status.innerText = labels.processing;

        try {
            const zip = new JSZip();
            filesArray.forEach(file => zip.file(file.name, file));
            
            const content = await zip.generateAsync({
                type: "blob",
                compression: "DEFLATE",
                compressionOptions: { level: level }
            });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = zipName.endsWith('.zip') ? zipName : zipName + ".zip";
            link.click();
            
            status.innerHTML = `<span style="color:var(--primary)">${labels.done}</span>`;
        } catch (e) {
            status.innerText = labels.error;
        } finally {
            btn.disabled = false;
        }
    }

    window.onload = initI18n;

    // ドラッグ&ドロップ対応
    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
    });
</script>
</body>
</html>
