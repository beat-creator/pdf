<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュアZIP作成 | Secure Toolkit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #059669; --bg: #f0fdf4; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* ナビゲーション */
        .nav-header { width: 100%; max-width: 500px; margin-bottom: 20px; display: flex; justify-content: flex-start; }
        .nav-link { color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; }
        .nav-link::before { content: '🏠'; margin-right: 5px; }

        .container { max-width: 500px; width: 100%; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* 説明文セクション */
        .info-box { background: #f8fafc; border-left: 4px solid #6ee7b7; padding: 12px; margin-bottom: 20px; font-size: 0.8rem; line-height: 1.5; color: #475569; }
        
        .drop-zone { border: 2px dashed #6ee7b7; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; background: #fff; transition: 0.3s; }
        .drop-zone:hover { background: #f0fdf4; border-color: var(--primary); }
        
        #file-list { margin-top: 20px; list-style: none; padding: 0; max-height: 150px; overflow-y: auto; }
        .file-item { display: flex; align-items: center; background: #f1f5f9; margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; }
        .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .remove-btn { color: #ef4444; cursor: pointer; font-weight: bold; margin-left: 10px; padding: 4px; }
        
        .config { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        
        .main-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 16px; font-size: 1rem; }
        .main-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        #status-msg { margin-top: 12px; text-align: center; font-weight: bold; min-height: 1.2rem; }
    </style>
</head>
<body>

        <a href="/" class="nav-link">トップページへ戻る</a>
    </header>
