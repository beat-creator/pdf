<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュア圧縮ツール | Secure Toolkit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { 
            --primary: #059669; 
            --primary-hover: #047857;
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text: #1e293b; 
            --border: #e2e8f0;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* アプリ風ヘッダー */
        .app-header {
            width: 100%;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .back-btn:hover { background: #e2e8f0; }

        .container { 
            max-width: 500px; 
            width: 95%; 
            background: var(--card-bg); 
            margin: 20px 0;
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
        }
        
        .info-box { 
            background: #ecfdf5; 
            border-radius: 12px;
            padding: 12px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            line-height: 1.5; 
            color: var(--primary-hover);
            display: flex;
            align-items: flex-start;
        }

        .drop-zone { 
            border: 2px dashed var(--primary); 
            border-radius: 16px; 
            padding: 30px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: #fff; 
            transition: 0.3s; 
            color: var(--primary);
            font-weight: bold;
        }
        .drop-zone:hover { background: #f0fdf4; border-color: var(--primary-hover); }
        
        /* 並び替えリスト */
        #file-list { margin: 20px 0; padding: 0; }
        .file-item { 
            display: flex; 
            align-items: center; 
            background: #f8fafc; 
            margin-bottom: 10px; 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            font-size: 0.85rem; 
        }
        .thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; margin-right: 12px; background: #e2e8f0; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .file-size { font-size: 0.75rem; color: #64748b; }
        
        .sort-controls { display: flex; gap: 5px; margin-left: 10px; }
        .sort-btn { border: none; background: white; border-radius: 6px; padding: 5px 8px; cursor: pointer; border: 1px solid var(--border); font-size: 0.8rem; }
        .remove-btn { color: #ef4444; border: none; background: none; cursor: pointer; font-size: 1.2rem; margin-left: 10px; }

        .config-card { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; margin-bottom: 12px; }
        
        .main-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.2);
            transition: 0.2s;
        }
        .main-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .main-btn:disabled { background: #cbd5e1; transform: none; box-shadow: none; cursor: not-allowed; }
        
        #status-msg { margin-top: 15px; text-align: center; font-weight: bold; color: var(--primary); min-height: 1.2rem; }
    </style>

<link rel="icon" href="../icon-512.png" type="image/png">
<link rel="apple-touch-icon" href="../icon-512.png">

    
</head>
<body>

    <header class="app-header">
        <a href="../" class="back-btn">
            <span style="margin-right:6px;">🏠</span> ツール一覧
        </a>
        <div style="flex:1; text-align:center; font-weight:bold; margin-right:60px;">Secure ZIP</div>
    </header>

    <div class="container">
        <h1 style="font-size: 1.3rem; margin-bottom: 20px; text-align:center;">📦 セキュア圧縮ツール</h1>
        
        <div class="info-box">
            <span>🔒</span>
            <div style="margin-left:8px;">
                <strong>サーバー送信なし:</strong> 処理はすべてブラウザ内で完結。機密書類や写真も安心してZIP化できます。
            </div>
        </div>
        
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div>➕ ファイルを選択 または ドロップ</div>
            <div style="font-size: 0.7rem; font-weight: normal; margin-top: 5px;">複数選択・追加可能</div>
            <input type="file" id="file-input" multiple style="display:none" onchange="handleFiles(this.files)">
        </div>

        <div id="file-list"></div>

        <div class="config-card">
            <label>保存ファイル名</label>
            <input type="text" id="zip-name" placeholder="ファイル名を入力">
            
            <label>圧縮レベル</label>
            <select id="comp-level">
                <option value="1">低圧縮 (高速)</option>
                <option value="6" selected>標準 (推奨)</option>
                <option value="9">最高圧縮 (低速)</option>
            </select>
        </div>

        <button id="zip-btn" class="main-btn" onclick="generateZip()" disabled>ZIPを作成して保存</button>
        <div id="status-msg"></div>
    </div>

    <script>
        let filesArray = [];

        window.onload = () => {
            const n = new Date();
            const ts = `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}`;
            document.getElementById('zip-name').value = `archive_${ts}`;
        };

        // ドラッグ＆ドロップ視覚効果
        const dz = document.getElementById('drop-zone');
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = "#f0fdf4"; });
        dz.addEventListener('dragleave', () => { dz.style.background = "#fff"; });
        dz.addEventListener('drop', (e) => {
            e.preventDefault();
            dz.style.background = "#fff";
            handleFiles(e.dataTransfer.files);
        });

        async function handleFiles(files) {
            for (let file of files) {
                const thumb = file.type.startsWith('image/') ? await createThumb(file) : null;
                filesArray.push({ file, thumb, id: Date.now() + Math.random() });
            }
            updateList();
        }

        function createThumb(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = (e) => res(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function updateList() {
            const list = document.getElementById('file-list');
            const btn = document.getElementById('zip-btn');
            list.innerHTML = '';
            
            filesArray.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                const thumbImg = item.thumb ? `<img src="${item.thumb}" class="thumb">` : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;">📄</div>`;
                
                div.innerHTML = `
                    ${thumbImg}
                    <div class="file-info">
                        <span class="file-name">${item.file.name}</span>
                        <span class="file-size">${(item.file.size/1024).toFixed(1)} KB</span>
                    </div>
                    <div class="sort-controls">
                        <button class="sort-btn" onclick="move(${index}, -1)">↑</button>
                        <button class="sort-btn" onclick="move(${index}, 1)">↓</button>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${index})">✕</button>
                `;
                list.appendChild(div);
            });
            btn.disabled = filesArray.length === 0;
        }

        function move(index, step) {
            const target = index + step;
            if (target < 0 || target >= filesArray.length) return;
            const temp = filesArray[index];
            filesArray[index] = filesArray[target];
            filesArray[target] = temp;
            updateList();
        }

        function removeFile(index) {
            filesArray.splice(index, 1);
            updateList();
        }

        async function generateZip() {
            const zip = new JSZip();
            const btn = document.getElementById('zip-btn');
            const status = document.getElementById('status-msg');
            const level = parseInt(document.getElementById('comp-level').value);
            
            btn.disabled = true;
            status.innerText = "⚡ 圧縮中...";

            try {
                filesArray.forEach(item => {
                    zip.file(item.file.name, item.file, { binary: true });
                });

                const content = await zip.generateAsync({
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: level }
                });

                let zipName = document.getElementById('zip-name').value.trim() || "archive";
                if (!zipName.toLowerCase().endsWith('.zip')) zipName += '.zip';

                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = zipName;
                link.click();

                status.innerHTML = '✅ 作成が完了しました！';
            } catch (e) {
                status.innerText = "❌ エラーが発生しました";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
